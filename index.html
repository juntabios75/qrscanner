<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MBHS - QR Attendance Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      touch-action: manipulation;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 25px;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-height: 98vh;
      overflow-y: auto;
    }
    .header { text-align: center; margin-bottom: 15px; }
    .header i { font-size: 40px; color: #6c5ce7; margin-bottom: 5px; }
    .header h2 { color: #2c3e50; font-size: 22px; }
    .header p { color: #7f8c8d; font-size: 13px; }
    
    #reader-container {
      width: 100%;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      min-height: 300px;
    }
    #reader-container video {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    #reader-container canvas {
      display: none;
    }
    
    #result { margin-top: 12px; text-align: center; min-height: 40px; max-height: 300px; overflow-y: auto; }
    
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      touch-action: manipulation;
      min-height: 48px;
    }
    .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(108,92,231,0.3); }
    .btn-primary:active { transform: scale(0.95); }
    .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(231,76,60,0.3); }
    .btn-danger:active { transform: scale(0.95); }
    .btn-success { background: linear-gradient(135deg, #28a745, #20c997); color: white; }
    .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(40,167,69,0.3); }
    .btn-success:active { transform: scale(0.95); }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(108,117,125,0.3); }
    .btn-secondary:active { transform: scale(0.95); }
    
    .btn-group { 
      display: flex; 
      gap: 8px; 
      margin-top: 12px; 
      justify-content: center; 
      flex-wrap: wrap; 
    }
    .btn-group .btn { flex: 1; min-width: 120px; justify-content: center; }
    
    .status-box {
      padding: 10px 14px;
      border-radius: 10px;
      margin: 8px 0;
      text-align: center;
      font-size: 13px;
    }
    .status-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    .status-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    .status-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
    .status-warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
    
    .scanned-result {
      background: #d4edda;
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid #28a745;
      margin-bottom: 8px;
      animation: slideIn 0.3s ease;
    }
    .scanned-result .info-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .scanned-result .info-row:last-child { border-bottom: none; }
    .scanned-result .label { font-weight: 600; color: #2c3e50; }
    .scanned-result .value { color: #155724; font-weight: 500; }
    
    .hidden { display: none !important; }
    
    .counter {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      padding: 6px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .counter span { font-weight: 700; color: #6c5ce7; }
    
    .scan-animation {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 1.5s ease-in-out infinite;
      margin-right: 6px;
    }
    
    .status-text {
      text-align: center;
      font-size: 12px;
      color: #95a5a6;
      margin-top: 8px;
    }
    
    .send-status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    .send-status.success { background: #d4edda; color: #155724; }
    .send-status.error { background: #f8d7da; color: #721c24; }
    .send-status.sending { background: #d1ecf1; color: #0c5460; }
    
    .server-datetime {
      background: #f0f2f5;
      padding: 10px 14px;
      border-radius: 8px;
      margin: 10px 0;
      text-align: center;
      font-size: 13px;
      color: #2c3e50;
      border: 1px solid #e4e6eb;
    }
    .server-datetime i { color: #6c5ce7; margin-right: 6px; }
    .server-datetime .date { font-weight: 600; }
    .server-datetime .time { font-weight: 600; color: #6c5ce7; }
    
    .attendance-status {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 4px;
    }
    .attendance-status.on-time { background: #d4edda; color: #155724; }
    .attendance-status.late { background: #fff3cd; color: #856404; }
    .attendance-status.early { background: #d1ecf1; color: #0c5460; }
    
    .debug-info {
      background: #f8f9fa;
      padding: 8px;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      word-break: break-all;
      border: 1px solid #e4e6eb;
      display: none;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    @media (max-width: 500px) {
      .container { padding: 15px; }
      .btn { width: 100%; justify-content: center; font-size: 14px; }
      .btn-group { flex-direction: column; }
      .btn-group .btn { flex: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <i class="fas fa-qrcode"></i>
      <h2>QR Attendance Scanner</h2>
      <p>Scan QR code to auto-fill attendance form</p>
    </div>

    <div class="server-datetime" id="serverDateTime">
      <i class="fas fa-calendar-day"></i>
      <span class="date" id="serverDate">Loading date...</span>
      <span style="margin: 0 6px;">|</span>
      <i class="fas fa-clock"></i>
      <span class="time" id="serverTime">Loading time...</span>
      <br>
      <span class="attendance-status on-time" id="attendanceStatus">✓ On Time</span>
    </div>

    <div id="statusMessage" class="status-box status-info">
      <i class="fas fa-spinner fa-spin"></i> Initializing...
    </div>

    <div id="reader-container">
      <div id="reader"></div>
    </div>
    
    <div id="result"></div>
    <div id="sendStatus" class="send-status hidden"></div>

    <div class="btn-group">
      <button class="btn btn-primary" id="startBtn">
        <i class="fas fa-camera"></i> Start Camera
      </button>
      <button class="btn btn-danger hidden" id="stopBtn">
        <i class="fas fa-stop"></i> Stop
      </button>
      <button class="btn btn-secondary" onclick="window.close()">
        <i class="fas fa-times"></i> Close
      </button>
    </div>

    <div class="counter">
      <i class="fas fa-users"></i> Scanned: <span id="scanCount">0</span> students
    </div>

    <div class="status-text">
      <span id="statusText">Ready</span>
    </div>
    
    <div class="debug-info" id="debugInfo"></div>
  </div>

  <!-- Load scripts with defer and proper ordering -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
  <script>
    // ========================================
    // CONFIGURATION
    // ========================================
    const SCRIPT_ID = 'AKfycbys-BkQT0jRnPC6q5neSRj6JqmOFG_BKa2luh1uI7gwYjaHRDOYmMCOvBDqbV7V310PrA';
    
    function getWebAppUrl() {
      return 'https://script.google.com/macros/s/' + SCRIPT_ID + '/exec';
    }
    
    let html5QrCode = null;
    let isScanning = false;
    let scanCount = 0;
    let isProcessing = false;
    let serverDateTime = {};
    let scannerInitialized = false;
    let retryCount = 0;
    const MAX_RETRIES = 3;

    // ========================================
    // DOM REFS
    // ========================================
    const statusMessage = document.getElementById('statusMessage');
    const statusText = document.getElementById('statusText');
    const resultDiv = document.getElementById('result');
    const scanCountEl = document.getElementById('scanCount');
    const stopBtn = document.getElementById('stopBtn');
    const startBtn = document.getElementById('startBtn');
    const sendStatus = document.getElementById('sendStatus');
    const serverDateEl = document.getElementById('serverDate');
    const serverTimeEl = document.getElementById('serverTime');
    const attendanceStatusEl = document.getElementById('attendanceStatus');
    const debugInfo = document.getElementById('debugInfo');
    const readerContainer = document.getElementById('reader-container');

    // ========================================
    // DEBUG FUNCTION
    // ========================================
    function debugLog(message) {
      console.log('[QR Scanner Debug]', message);
      debugInfo.style.display = 'block';
      debugInfo.innerHTML += new Date().toLocaleTimeString() + ': ' + message + '<br>';
      // Keep only last 5 messages
      const lines = debugInfo.innerHTML.split('<br>');
      if (lines.length > 10) {
        debugInfo.innerHTML = lines.slice(-10).join('<br>');
      }
    }

    // ========================================
    // SERVER DATE/TIME FUNCTIONS
    // ========================================
    function loadServerDateTime() {
      const url = getWebAppUrl() + '?action=getServerDateTime';
      fetch(url)
        .then(response => response.json())
        .then(data => {
          serverDateTime = data;
          updateServerDisplay(data);
        })
        .catch(function() {
          // Fallback to client-side time
          const now = new Date();
          const phTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
          const dateStr = phTime.toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          });
          const timeStr = phTime.toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
          });
          const totalMinutes = phTime.getHours() * 60 + phTime.getMinutes();
          const status = getAttendanceStatus(totalMinutes);
          updateServerDisplay({
            date: phTime.toISOString().split('T')[0],
            time: timeStr,
            status: status.status,
            statusMessage: status.message
          });
        });
    }

    function getAttendanceStatus(totalMinutes) {
      const START_WINDOW = 355; // 5:55 AM
      const END_WINDOW = 375;   // 6:15 AM
      
      if (totalMinutes < START_WINDOW) {
        return { status: 'EARLY', message: '⏰ Too early! Attendance starts at 5:55 AM.', class: 'early' };
      } else if (totalMinutes >= START_WINDOW && totalMinutes <= END_WINDOW) {
        return { status: 'P', message: '✓ On Time', class: 'on-time' };
      } else {
        return { status: 'L', message: '⏰ LATE', class: 'late' };
      }
    }

    function updateServerDisplay(data) {
      let dateDisplay = data.date;
      try {
        const dateObj = new Date(data.date + 'T00:00:00');
        dateDisplay = dateObj.toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          timeZone: 'Asia/Manila'
        });
      } catch(e) {}
      
      serverDateEl.textContent = dateDisplay;
      serverTimeEl.textContent = data.time || data.timeFormatted || '--:--';
      
      let statusClass = 'on-time';
      let statusText = '✓ On Time';
      
      if (data.status === 'EARLY') {
        statusClass = 'early';
        statusText = '⏰ Too Early';
      } else if (data.status === 'L') {
        statusClass = 'late';
        statusText = '⏰ LATE';
      } else {
        statusClass = 'on-time';
        statusText = '✓ On Time';
      }
      
      attendanceStatusEl.className = 'attendance-status ' + statusClass;
      attendanceStatusEl.textContent = statusText;
      
      serverDateTime = data;
    }

    // ========================================
    // UTILITY FUNCTIONS
    // ========================================
    function updateStatus(message, type) {
      statusMessage.className = 'status-box status-' + type;
      statusMessage.innerHTML = message;
    }

    function updateText(text) {
      statusText.textContent = text;
    }

    function updateScanCount() {
      scanCountEl.textContent = scanCount;
    }

    function showSendStatus(message, type) {
      sendStatus.className = 'send-status ' + type;
      sendStatus.innerHTML = message;
      sendStatus.classList.remove('hidden');
    }

    function hideSendStatus() {
      sendStatus.classList.add('hidden');
    }

    function showScannedResult(name, lrn, email, statusDisplay) {
      resultDiv.innerHTML = `
        <div class="scanned-result">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <i class="fas fa-check-circle" style="color: #28a745; font-size: 16px;"></i>
              <span style="font-weight: 600; margin-left: 6px; font-size: 14px;">QR Code detected!</span>
            </div>
            <span style="font-size: 11px; color: #155724;">${new Date().toLocaleTimeString()}</span>
          </div>
          <div class="info-row"><span class="label">Name:</span><span class="value">${name}</span></div>
          <div class="info-row"><span class="label">LRN:</span><span class="value">${lrn}</span></div>
          <div class="info-row"><span class="label">Email:</span><span class="value">${email || 'N/A'}</span></div>
          <div class="info-row"><span class="label">Status:</span><span class="value"><span style="background:#6c5ce7;color:white;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;">${statusDisplay}</span></span></div>
        </div>
      `;
    }

    function showReadyMessage() {
      resultDiv.innerHTML = `
        <div style="background:#d1ecf1;padding:12px;border-radius:10px;border-left:4px solid #17a2b8;text-align:center;font-size:13px;color:#0c5460;">
          <i class="fas fa-camera"></i> Ready for next student. Scan another QR code.
        </div>
      `;
    }

    // ========================================
    // QR SCANNER - FIXED VERSION
    // ========================================
    function startScannerManually() {
      debugLog('Start scanner manually called');
      
      // Check if we're in a secure context
      if (!window.isSecureContext) {
        debugLog('Not in secure context (HTTPS)');
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera requires HTTPS.', 'error');
        updateText('❌ HTTPS required');
        return;
      }

      // Check if camera is supported
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        debugLog('Camera not supported in this browser');
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera not supported.', 'error');
        updateText('❌ Not supported');
        return;
      }

      startBtn.disabled = true;
      startBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Starting...';
      
      // Try to initialize with environment camera first (back camera)
      initializeScannerWithRetry('environment');
    }

    function initializeScannerWithRetry(facingMode, retryCount = 0) {
      debugLog(`Initializing scanner with facingMode: ${facingMode}, retry: ${retryCount}`);
      
      // Clean up any existing scanner
      if (html5QrCode) {
        try {
          html5QrCode.stop().then(() => {
            html5QrCode.clear();
            html5QrCode = null;
            debugLog('Previous scanner stopped and cleared');
          }).catch(() => {
            html5QrCode = null;
          });
        } catch(e) {
          html5QrCode = null;
        }
      }

      // Wait for the library to be loaded
      if (typeof Html5Qrcode === 'undefined') {
        debugLog('Html5Qrcode not loaded yet, waiting...');
        if (retryCount < 10) {
          setTimeout(() => {
            initializeScannerWithRetry(facingMode, retryCount + 1);
          }, 500);
          return;
        } else {
          debugLog('Html5Qrcode failed to load after retries');
          updateStatus('<i class="fas fa-exclamation-circle"></i> Scanner library failed to load. Please refresh and try again.', 'error');
          updateText('❌ Library load error');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
          return;
        }
      }

      try {
        // Create scanner instance
        const readerElement = document.getElementById('reader');
        if (!readerElement) {
          debugLog('Reader element not found');
          updateStatus('<i class="fas fa-exclamation-circle"></i> Scanner container not found.', 'error');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
          return;
        }

        // Clear the reader element
        readerElement.innerHTML = '';
        
        // Create new scanner instance
        html5QrCode = new Html5Qrcode("reader");
        debugLog('Html5Qrcode instance created successfully');
        
        const config = {
          fps: 15,
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0,
          formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
        };

        // Start scanning
        html5QrCode.start(
          { facingMode: facingMode || "environment" },
          config,
          onScanSuccess,
          onScanError
        ).then(() => {
          isScanning = true;
          scannerInitialized = true;
          updateStatus('<i class="fas fa-camera"></i> <span class="scan-animation"></span> Scanning... Point at a QR code.', 'success');
          updateText('🔍 Ready - Scan student QR codes');
          resultDiv.innerHTML = '';
          startBtn.classList.add('hidden');
          stopBtn.classList.remove('hidden');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
          debugLog('Scanner started successfully');
        }).catch(err => {
          debugLog('Failed to start scanner: ' + err.message);
          // If environment fails, try user facing
          if (facingMode === 'environment') {
            debugLog('Trying user-facing camera...');
            initializeScannerWithRetry('user', 0);
          } else {
            updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to start camera: ' + err.message, 'error');
            updateText('❌ Scanner error');
            startBtn.disabled = false;
            startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
          }
        });
      } catch (err) {
        debugLog('Error creating scanner: ' + err.message);
        updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to initialize: ' + err.message, 'error');
        updateText('❌ Initialization error');
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
      }
    }

    function autoStartScanner() {
      debugLog('Auto-start scanner called');
      setTimeout(startScannerManually, 800);
    }

    // ========================================
    // SCAN SUCCESS
    // ========================================
    function onScanSuccess(decodedText, decodedResult) {
      debugLog('QR Code scanned: ' + decodedText.substring(0, 20) + '...');
      
      if (isProcessing) return;
      isProcessing = true;
      hideSendStatus();
      
      let email = '';
      let lrn = '';
      let studentName = 'Student';
      
      if (decodedText.includes('|')) {
        const parts = decodedText.split('|');
        email = parts[0].trim();
        lrn = parts[1].trim();
      } else if (/^\d{12}$/.test(decodedText)) {
        lrn = decodedText;
      } else {
        resultDiv.innerHTML = `
          <div style="background:#f8d7da;padding:12px;border-radius:10px;border-left:4px solid #dc3545;">
            <i class="fas fa-exclamation-circle" style="color:#dc3545;font-size:16px;"></i>
            <div style="margin-top:3px;font-weight:600;font-size:13px;">Invalid QR Code</div>
            <div style="font-size:11px;color:#721c24;">Please scan a valid attendance QR code.</div>
          </div>
        `;
        isProcessing = false;
        return;
      }

      if (!/^\d{12}$/.test(lrn)) {
        resultDiv.innerHTML = `
          <div style="background:#f8d7da;padding:12px;border-radius:10px;border-left:4px solid #dc3545;">
            <i class="fas fa-exclamation-circle" style="color:#dc3545;font-size:16px;"></i>
            <div style="margin-top:3px;font-weight:600;font-size:13px;">Invalid LRN</div>
            <div style="font-size:11px;color:#721c24;">LRN must be 12 digits: ${lrn}</div>
          </div>
        `;
        isProcessing = false;
        return;
      }

      // Get today's date
      const today = new Date().toISOString().split('T')[0];
      
      // Determine attendance status
      let status = 'P';
      let statusDisplay = 'Present (On Time)';
      
      if (serverDateTime && serverDateTime.status) {
        if (serverDateTime.status === 'EARLY') {
          status = 'E';
          statusDisplay = 'Too Early';
        } else if (serverDateTime.status === 'L') {
          status = 'L';
          statusDisplay = 'Late';
        } else {
          status = 'P';
          statusDisplay = 'Present (On Time)';
        }
      } else {
        // Fallback to client time
        const now = new Date();
        const phTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
        const totalMinutes = phTime.getHours() * 60 + phTime.getMinutes();
        const START_WINDOW = 355, END_WINDOW = 375;
        
        if (totalMinutes < START_WINDOW) { status = 'E'; statusDisplay = 'Too Early'; } 
        else if (totalMinutes >= START_WINDOW && totalMinutes <= END_WINDOW) { status = 'P'; statusDisplay = 'Present (On Time)'; } 
        else { status = 'L'; statusDisplay = 'Late'; }
      }

      showSendStatus('⏳ Looking up student...', 'sending');

      // Look up student name
      lookupStudent(lrn, function(name, studentEmail) {
        studentName = name || 'Student';
        const finalEmail = studentEmail || email;
        
        // Display result
        showScannedResult(studentName, lrn, finalEmail, statusDisplay);
        
        // Send data back to parent
        const dataToSend = finalEmail + '|' + lrn;
        
        if (window.opener && !window.opener.closed) {
          try {
            window.opener.postMessage({
              type: 'LRN_SCANNED',
              lrn: dataToSend
            }, '*');
            
            showSendStatus('✅ Data sent to attendance form!', 'success');
            updateText('✅ Sent to form - auto-submitting...');
            
            scanCount++;
            updateScanCount();
            
            setTimeout(function() {
              showReadyMessage();
              updateText('🔍 Ready for next student');
              hideSendStatus();
              isProcessing = false;
            }, 2000);
            
          } catch(e) {
            debugLog('Error sending to parent: ' + e.message);
            showSendStatus('⚠️ Could not send to form. Copy the LRN below.', 'warning');
            copyToClipboard(lrn, finalEmail);
            setTimeout(function() {
              isProcessing = false;
            }, 1500);
          }
        } else {
          showSendStatus('⚠️ No parent window found. Copy the data below.', 'warning');
          copyToClipboard(lrn, finalEmail);
          setTimeout(function() {
            isProcessing = false;
          }, 1500);
        }
      });
    }

    function onScanError(errorMessage) {
      // Silent errors - only log if critical
      if (errorMessage && 
          (errorMessage.includes('NotFoundError') || 
           errorMessage.includes('Permission') ||
           errorMessage.includes('NotAllowedError'))) {
        debugLog('Scan error (non-critical): ' + errorMessage);
      }
    }

    function stopScanner() {
      debugLog('Stopping scanner');
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
          isScanning = false;
          scannerInitialized = false;
          stopBtn.classList.add('hidden');
          startBtn.classList.remove('hidden');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
          updateStatus('<i class="fas fa-info-circle"></i> Scanner stopped.', 'info');
          updateText('⏹️ Stopped');
          debugLog('Scanner stopped successfully');
        }).catch(err => {
          debugLog('Error stopping scanner: ' + err.message);
          isScanning = false;
          stopBtn.classList.add('hidden');
          startBtn.classList.remove('hidden');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
        });
      } else {
        stopBtn.classList.add('hidden');
        startBtn.classList.remove('hidden');
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
      }
    }

    // ========================================
    // API FUNCTIONS
    // ========================================
    function getApiUrl(endpoint, params) {
      const baseUrl = getWebAppUrl();
      let url = baseUrl + '?' + endpoint;
      if (params) {
        for (const key in params) {
          url += '&' + key + '=' + encodeURIComponent(params[key]);
        }
      }
      return url;
    }

    function lookupStudent(lrn, callback) {
      const url = getApiUrl('action=getStudent', { lrn: lrn });
      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data && data.name) {
            callback(data.name, data.email);
          } else {
            callback('Student', '');
          }
        })
        .catch(function() {
          callback('Student', '');
        });
    }

    function copyToClipboard(lrn, email) {
      const text = email + '|' + lrn;
      navigator.clipboard.writeText(text).then(() => {
        resultDiv.innerHTML += `
          <div style="margin-top:10px;padding:10px;background:#d4edda;border-radius:8px;font-size:13px;">
            <strong>Copied:</strong> ${text}
          </div>
        `;
        updateText('📋 Copied to clipboard');
      }).catch(() => {
        resultDiv.innerHTML += `
          <div style="margin-top:10px;padding:10px;background:#fff3cd;border-radius:8px;font-size:13px;">
            <strong>Data:</strong> ${text}
          </div>
        `;
      });
    }

    // ========================================
    // EVENT LISTENERS
    // ========================================
    startBtn.addEventListener('click', startScannerManually);
    stopBtn.addEventListener('click', stopScanner);

    // ========================================
    // START ON PAGE LOAD
    // ========================================
    window.addEventListener('DOMContentLoaded', function() {
      debugLog('Page loaded - QR Scanner v2');
      
      // Load server date/time
      loadServerDateTime();
      
      // Log the Web App URL
      debugLog('Web App URL: ' + getWebAppUrl());
      
      // Auto-start after a delay
      setTimeout(autoStartScanner, 1000);
    });

    window.addEventListener('beforeunload', function() {
      stopScanner();
    });

    // Handle orientation changes on mobile
    window.addEventListener('orientationchange', function() {
      debugLog('Orientation changed, refreshing scanner...');
      if (isScanning) {
        stopScanner();
        setTimeout(startScannerManually, 500);
      }
    });

    // Handle visibility change (tab switching)
    document.addEventListener('visibilitychange', function() {
      if (document.hidden && isScanning) {
        debugLog('Tab hidden, stopping scanner to save resources');
        stopScanner();
      } else if (!document.hidden && !isScanning && scannerInitialized) {
        debugLog('Tab visible, restarting scanner');
        setTimeout(startScannerManually, 300);
      }
    });
  </script>
</body>
</html>
