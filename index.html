<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBHS - QR Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header { text-align: center; margin-bottom: 25px; }
    .header i { font-size: 48px; color: #6c5ce7; margin-bottom: 10px; }
    .header h2 { color: #2c3e50; font-size: 24px; }
    .header p { color: #7f8c8d; font-size: 14px; }
    #reader { width: 100%; margin: 0 auto; }
    #reader video { border-radius: 12px; width: 100% !important; }
    #result { margin-top: 20px; text-align: center; min-height: 50px; }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(108,92,231,0.3); }
    .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(231,76,60,0.3); }
    .btn-success { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
    .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(46,204,113,0.3); }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
    .status-box {
      padding: 12px 16px;
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
      font-size: 14px;
    }
    .status-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    .status-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    .status-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
    .status-warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
    .lrn-display {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #2c3e50;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
      margin: 10px 0;
    }
    .hidden { display: none !important; }
    .scanned-result {
      background: #d4edda;
      padding: 20px;
      border-radius: 12px;
      border-left: 4px solid #28a745;
    }
    .scanned-result .info-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .scanned-result .info-row:last-child {
      border-bottom: none;
    }
    .scanned-result .label {
      font-weight: 600;
      color: #2c3e50;
    }
    .scanned-result .value {
      color: #155724;
      font-weight: 500;
    }
    @media (max-width: 500px) {
      .container { padding: 20px; }
      .btn { width: 100%; justify-content: center; }
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <i class="fas fa-qrcode"></i>
      <h2>QR Code Scanner</h2>
      <p>Scan QR code to auto-fill attendance form</p>
    </div>

    <div id="statusMessage" class="status-box status-info">
      <i class="fas fa-info-circle"></i> Click "Start Scanner" to begin
    </div>

    <div id="reader"></div>
    <div id="result"></div>

    <div class="btn-group">
      <button class="btn btn-primary" id="startBtn" onclick="startScanner()">
        <i class="fas fa-camera"></i> Start Scanner
      </button>
      <button class="btn btn-danger hidden" id="stopBtn" onclick="stopScanner()">
        <i class="fas fa-stop"></i> Stop
      </button>
      <button class="btn btn-success hidden" id="useBtn" onclick="useScannedData()">
        <i class="fas fa-check"></i> Use This QR Code
      </button>
      <button class="btn btn-danger" onclick="window.close()">
        <i class="fas fa-times"></i> Close
      </button>
    </div>

    <div style="text-align: center; margin-top: 15px; font-size: 12px; color: #95a5a6;">
      <span id="statusText">Ready</span>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let html5QrCode = null;
    let isScanning = false;
    let scannedData = null;
    let scannedEmail = '';
    let scannedLRN = '';

    function updateStatus(message, type) {
      const box = document.getElementById('statusMessage');
      box.className = 'status-box status-' + type;
      box.innerHTML = message;
    }

    function updateText(text) {
      document.getElementById('statusText').textContent = text;
    }

    function startScanner() {
      updateStatus('<i class="fas fa-spinner fa-spin"></i> Requesting camera access...', 'info');
      updateText('Requesting camera...');

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera not supported. Please use Chrome or Edge.', 'error');
        updateText('❌ Not supported');
        return;
      }

      if (!window.isSecureContext) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera requires HTTPS. Please use a secure connection.', 'error');
        updateText('❌ HTTPS required');
        return;
      }

      navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" } 
      })
      .then(function(stream) {
        stream.getTracks().forEach(track => track.stop());
        
        updateStatus('<i class="fas fa-check-circle"></i> Camera access granted!', 'success');
        updateText('✅ Camera ready');
        
        document.getElementById('startBtn').classList.add('hidden');
        document.getElementById('stopBtn').classList.remove('hidden');
        
        initializeScanner();
      })
      .catch(function(err) {
        console.error('Camera error:', err);
        
        let message = '';
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          message = `
            <i class="fas fa-times-circle"></i> 
            <strong>Camera access was denied.</strong><br><br>
            Please allow camera access:<br>
            1. Click the camera icon in your browser's address bar<br>
            2. Select "Allow" for camera access<br>
            3. Click "Start Scanner" again<br><br>
            <button onclick="startScanner()" class="btn btn-primary" style="margin-top:10px;padding:8px 20px;font-size:13px;">
              <i class="fas fa-redo"></i> Try Again
            </button>
          `;
        } else if (err.name === 'NotFoundError') {
          message = '<i class="fas fa-exclamation-circle"></i> No camera found on this device.';
        } else {
          message = '<i class="fas fa-exclamation-circle"></i> Error: ' + err.message;
        }
        
        updateStatus(message, 'error');
        updateText('❌ Camera error');
      });
    }

    function initializeScanner() {
      if (html5QrCode) {
        html5QrCode.clear();
        html5QrCode = null;
      }

      try {
        html5QrCode = new Html5Qrcode("reader");

        const config = {
          fps: 10,
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0
        };

        html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanError
        ).then(() => {
          isScanning = true;
          updateStatus('<i class="fas fa-camera"></i> Scanning... Point at a QR code.', 'success');
          updateText('🔍 Scanning...');
        }).catch(err => {
          console.error('QR Scanner start error:', err);
          updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to start: ' + err.message, 'error');
          updateText('❌ Scanner error');
          stopScanner();
        });
      } catch (err) {
        console.error('QR Scanner initialization error:', err);
        updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to initialize: ' + err.message, 'error');
        updateText('❌ Initialization error');
        stopScanner();
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      stopScanner();
      
      scannedData = decodedText;
      const resultDiv = document.getElementById('result');
      const useBtn = document.getElementById('useBtn');
      
      // Check if data contains pipe (email|lrn format)
      if (decodedText.includes('|')) {
        const parts = decodedText.split('|');
        const email = parts[0].trim();
        const lrn = parts[1].trim();
        
        if (email && email.includes('@') && /^\d{12}$/.test(lrn)) {
          scannedEmail = email;
          scannedLRN = lrn;
          
          resultDiv.innerHTML = `
            <div class="scanned-result">
              <i class="fas fa-check-circle" style="color: #28a745; font-size: 24px;"></i>
              <div style="margin-top: 10px; font-weight: 600;">QR Code detected!</div>
              <div style="margin: 10px 0; background: white; border-radius: 8px; padding: 10px;">
                <div class="info-row">
                  <span class="label"><i class="fas fa-envelope"></i> Email:</span>
                  <span class="value">${email}</span>
                </div>
                <div class="info-row">
                  <span class="label"><i class="fas fa-id-card"></i> LRN:</span>
                  <span class="value">${lrn}</span>
                </div>
              </div>
              <div style="font-size: 13px; color: #155724;">Click "Use This QR Code" to auto-fill the attendance form.</div>
            </div>
          `;
          updateText('✅ QR Code detected!');
          useBtn.classList.remove('hidden');
          return;
        }
      }
      
      // Legacy: Only LRN (12 digits) - for backwards compatibility
      if (/^\d{12}$/.test(decodedText)) {
        scannedLRN = decodedText;
        scannedEmail = '';
        
        resultDiv.innerHTML = `
          <div class="scanned-result">
            <i class="fas fa-check-circle" style="color: #28a745; font-size: 24px;"></i>
            <div style="margin-top: 10px; font-weight: 600;">QR Code detected!</div>
            <div class="lrn-display">${decodedText}</div>
            <div style="font-size: 13px; color: #155724;">Click "Use This QR Code" to auto-fill the attendance form.</div>
          </div>
        `;
        updateText('✅ QR Code detected!');
        useBtn.classList.remove('hidden');
      } else {
        // Invalid QR Code
        resultDiv.innerHTML = `
          <div style="background: #f8d7da; padding: 20px; border-radius: 12px; border-left: 4px solid #dc3545;">
            <i class="fas fa-exclamation-circle" style="color: #dc3545; font-size: 24px;"></i>
            <div style="margin-top: 10px; font-weight: 600;">Invalid QR Code</div>
            <div style="font-size: 14px; word-break: break-all; background: white; padding: 10px; border-radius: 8px; margin-top: 10px;">
              ${decodedText}
            </div>
            <div style="font-size: 12px; color: #721c24; margin-top: 10px;">
              Expected format: <strong>email@example.com|123456789012</strong> or <strong>12-digit LRN</strong>
            </div>
          </div>
        `;
        updateText('❌ Invalid QR Code');
        useBtn.classList.add('hidden');
      }
    }

    function onScanError(errorMessage) {
      if (errorMessage && (
        errorMessage.includes('NotFoundError') || 
        errorMessage.includes('Permission') ||
        errorMessage.includes('NotAllowed')
      )) {
        console.warn('QR Scan error:', errorMessage);
      }
    }

    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
          isScanning = false;
          document.getElementById('startBtn').classList.remove('hidden');
          document.getElementById('stopBtn').classList.add('hidden');
          updateText('⏹️ Stopped');
        }).catch(err => {
          console.error('Stop scanner error:', err);
        });
      }
    }

    function useScannedData() {
      if (!scannedLRN) {
        alert('No QR code scanned yet. Please scan a QR code first.');
        return;
      }

      // Determine what data to send
      let dataToSend = scannedLRN;
      if (scannedEmail && scannedLRN) {
        // Send both email and LRN in the format email|lrn
        dataToSend = scannedEmail + '|' + scannedLRN;
      }

      // Send data back to the parent window (the portal)
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage({
            type: 'LRN_SCANNED',
            lrn: dataToSend
          }, '*');
          
          const resultDiv = document.getElementById('result');
          resultDiv.innerHTML = `
            <div style="background: #d4edda; padding: 20px; border-radius: 12px; border-left: 4px solid #28a745;">
              <i class="fas fa-check-circle" style="color: #28a745; font-size: 24px;"></i>
              <div style="margin-top: 10px; font-weight: 600;">Data sent to portal!</div>
              ${scannedEmail ? `<div style="font-size: 13px; color: #155724;"><strong>Email:</strong> ${scannedEmail}</div>` : ''}
              <div style="font-size: 13px; color: #155724;"><strong>LRN:</strong> ${scannedLRN}</div>
              <div style="font-size: 13px; color: #155724; margin-top: 8px;">You can close this window.</div>
            </div>
          `;
          
          document.getElementById('useBtn').classList.add('hidden');
          updateText('✅ Data sent to portal!');
          
          setTimeout(() => {
            window.close();
          }, 2000);
          
        } catch(e) {
          console.error('Error sending to parent:', e);
          copyToClipboard();
        }
      } else {
        copyToClipboard();
      }
    }

    function copyToClipboard() {
      let textToCopy = scannedLRN;
      if (scannedEmail && scannedLRN) {
        textToCopy = `Email: ${scannedEmail}\nLRN: ${scannedLRN}`;
      }
      
      navigator.clipboard.writeText(textToCopy).then(() => {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
          <div style="background: #d4edda; padding: 20px; border-radius: 12px; border-left: 4px solid #28a745;">
            <i class="fas fa-check-circle" style="color: #28a745; font-size: 24px;"></i>
            <div style="margin-top: 10px; font-weight: 600;">Data copied to clipboard!</div>
            ${scannedEmail ? `<div style="font-size: 13px; color: #155724;"><strong>Email:</strong> ${scannedEmail}</div>` : ''}
            <div style="font-size: 13px; color: #155724;"><strong>LRN:</strong> ${scannedLRN}</div>
            <div style="font-size: 13px; color: #155724; margin-top: 8px;">Paste it into the portal form.</div>
          </div>
        `;
        document.getElementById('useBtn').classList.add('hidden');
        updateText('✅ Copied to clipboard!');
      }).catch(() => {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
          <div style="background: #d1ecf1; padding: 20px; border-radius: 12px; border-left: 4px solid #17a2b8;">
            <i class="fas fa-info-circle" style="color: #17a2b8; font-size: 24px;"></i>
            <div style="margin-top: 10px; font-weight: 600;">Data detected:</div>
            ${scannedEmail ? `<div style="font-size: 13px; color: #0c5460;"><strong>Email:</strong> ${scannedEmail}</div>` : ''}
            <div style="font-size: 13px; color: #0c5460;"><strong>LRN:</strong> ${scannedLRN}</div>
            <div style="font-size: 13px; color: #0c5460; margin-top: 8px;">Please copy manually.</div>
          </div>
        `;
        document.getElementById('useBtn').classList.add('hidden');
        updateText('📋 Data ready to copy');
      });
    }

    window.addEventListener('beforeunload', function() {
      stopScanner();
    });
  </script>
</body>
</html>
