<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBHS - QR Scanner for Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header { text-align: center; margin-bottom: 20px; }
    .header i { font-size: 48px; color: #6c5ce7; margin-bottom: 10px; }
    .header h2 { color: #2c3e50; font-size: 24px; }
    .header p { color: #7f8c8d; font-size: 14px; }
    .header .badge {
      display: inline-block;
      background: #e74c3c;
      color: white;
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }
    
    #reader { width: 100%; margin: 0 auto; }
    #reader video { border-radius: 12px; width: 100% !important; }
    
    #result { margin-top: 15px; text-align: center; min-height: 50px; max-height: 300px; overflow-y: auto; }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(108,92,231,0.3); }
    .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(231,76,60,0.3); }
    .btn-success { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
    .btn-group { display: flex; gap: 10px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
    
    .status-box {
      padding: 12px 16px;
      border-radius: 10px;
      margin: 10px 0;
      text-align: center;
      font-size: 14px;
    }
    .status-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    .status-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    .status-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
    .status-warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
    
    .scanned-result {
      background: #d4edda;
      padding: 15px;
      border-radius: 12px;
      border-left: 4px solid #28a745;
      margin-bottom: 10px;
      animation: slideIn 0.5s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .scanned-result .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .scanned-result .info-row:last-child { border-bottom: none; }
    .scanned-result .label { font-weight: 600; color: #2c3e50; }
    .scanned-result .value { color: #155724; font-weight: 500; }
    .scanned-result .status-badge {
      display: inline-block;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-badge.success { background: #28a745; color: white; }
    .status-badge.late { background: #f39c12; color: white; }
    .status-badge.error { background: #e74c3c; color: white; }
    
    .hidden { display: none !important; }
    
    .scanner-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      justify-content: center;
    }
    
    .counter {
      text-align: center;
      font-size: 13px;
      color: var(--gray);
      margin-top: 10px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .counter span { font-weight: 700; color: var(--primary); }
    
    .scan-animation {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .log-container {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 10px;
      border-top: 1px solid #e9ecef;
      padding-top: 10px;
    }
    .log-item {
      font-size: 12px;
      padding: 4px 8px;
      margin: 2px 0;
      border-radius: 4px;
      background: #f8f9fa;
      display: flex;
      justify-content: space-between;
    }
    .log-item .log-name { font-weight: 500; }
    .log-item .log-status { font-weight: 600; }
    .log-item .log-status.present { color: #27ae60; }
    .log-item .log-status.late { color: #f39c12; }
    
    @media (max-width: 500px) {
      .container { padding: 20px; }
      .btn { width: 100%; justify-content: center; }
      .btn-group { flex-direction: column; }
      .scanner-controls { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <i class="fas fa-qrcode"></i>
      <h2>QR Attendance Scanner</h2>
      <p>Scan student QR codes to record attendance</p>
      <span class="badge"><i class="fas fa-sync-alt"></i> Auto-scan mode</span>
    </div>

    <div id="statusMessage" class="status-box status-info">
      <i class="fas fa-info-circle"></i> Click "Start Scanner" to begin
    </div>

    <div id="reader"></div>
    <div id="result"></div>

    <div class="scanner-controls">
      <button class="btn btn-primary" id="startBtn" onclick="startScanner()">
        <i class="fas fa-camera"></i> Start Scanner
      </button>
      <button class="btn btn-danger hidden" id="stopBtn" onclick="stopScanner()">
        <i class="fas fa-stop"></i> Stop
      </button>
      <button class="btn btn-danger" onclick="window.close()">
        <i class="fas fa-times"></i> Close
      </button>
    </div>

    <div class="counter">
      <i class="fas fa-users"></i> Scanned: <span id="scanCount">0</span> students
    </div>

    <div id="logContainer" class="log-container hidden">
      <div style="font-size: 12px; font-weight: 600; color: var(--gray); margin-bottom: 5px;">
        <i class="fas fa-list"></i> Recent Scans
      </div>
      <div id="logList"></div>
    </div>

    <div style="text-align: center; margin-top: 10px; font-size: 12px; color: #95a5a6;">
      <span id="statusText">Ready</span>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let html5QrCode = null;
    let isScanning = false;
    let scanCount = 0;
    let isProcessing = false;

    // ========================================
    // WEB APP URL - Update this!
    // ========================================
    const WEB_APP_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';

    function updateStatus(message, type) {
      const box = document.getElementById('statusMessage');
      box.className = 'status-box status-' + type;
      box.innerHTML = message;
    }

    function updateText(text) {
      document.getElementById('statusText').textContent = text;
    }

    function updateScanCount() {
      document.getElementById('scanCount').textContent = scanCount;
    }

    function addToLog(name, lrn, status, time) {
      const logContainer = document.getElementById('logContainer');
      const logList = document.getElementById('logList');
      
      logContainer.classList.remove('hidden');
      
      const statusClass = status === 'Present' ? 'present' : 'late';
      const entry = document.createElement('div');
      entry.className = 'log-item';
      entry.innerHTML = `
        <span class="log-name">${name}</span>
        <span>
          <span style="color: #666; font-size: 11px;">${lrn}</span>
          <span class="log-status ${statusClass}">${status}</span>
        </span>
      `;
      logList.prepend(entry);
      
      // Keep only last 20 entries
      while (logList.children.length > 20) {
        logList.removeChild(logList.lastChild);
      }
    }

    function startScanner() {
      updateStatus('<i class="fas fa-spinner fa-spin"></i> Requesting camera access...', 'info');
      updateText('Requesting camera...');

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera not supported. Please use Chrome or Edge.', 'error');
        updateText('❌ Not supported');
        return;
      }

      if (!window.isSecureContext) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera requires HTTPS. Please use a secure connection.', 'error');
        updateText('❌ HTTPS required');
        return;
      }

      navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" } 
      })
      .then(function(stream) {
        stream.getTracks().forEach(track => track.stop());
        
        updateStatus('<i class="fas fa-check-circle"></i> Camera access granted! Ready to scan.', 'success');
        updateText('✅ Camera ready - Scan student QR codes');
        
        document.getElementById('startBtn').classList.add('hidden');
        document.getElementById('stopBtn').classList.remove('hidden');
        
        initializeScanner();
      })
      .catch(function(err) {
        console.error('Camera error:', err);
        
        let message = '';
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          message = `
            <i class="fas fa-times-circle"></i> 
            <strong>Camera access was denied.</strong><br><br>
            Please allow camera access:<br>
            1. Click the camera icon in your browser's address bar<br>
            2. Select "Allow" for camera access<br>
            3. Click "Start Scanner" again<br><br>
            <button onclick="startScanner()" class="btn btn-primary" style="margin-top:10px;padding:8px 20px;font-size:13px;">
              <i class="fas fa-redo"></i> Try Again
            </button>
          `;
        } else if (err.name === 'NotFoundError') {
          message = '<i class="fas fa-exclamation-circle"></i> No camera found on this device.';
        } else {
          message = '<i class="fas fa-exclamation-circle"></i> Error: ' + err.message;
        }
        
        updateStatus(message, 'error');
        updateText('❌ Camera error');
      });
    }

    function initializeScanner() {
      if (html5QrCode) {
        html5QrCode.clear();
        html5QrCode = null;
      }

      try {
        html5QrCode = new Html5Qrcode("reader");

        const config = {
          fps: 10,
          qrbox: { width: 280, height: 280 },
          aspectRatio: 1.0
        };

        html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanError
        ).then(() => {
          isScanning = true;
          updateStatus('<i class="fas fa-camera"></i> <span class="scan-animation"></span> Scanning... Point at a QR code.', 'success');
          updateText('🔍 Waiting for QR codes...');
          document.getElementById('result').innerHTML = '';
        }).catch(err => {
          console.error('QR Scanner start error:', err);
          updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to start: ' + err.message, 'error');
          updateText('❌ Scanner error');
          stopScanner();
        });
      } catch (err) {
        console.error('QR Scanner initialization error:', err);
        updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to initialize: ' + err.message, 'error');
        updateText('❌ Initialization error');
        stopScanner();
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      // Prevent multiple scans of the same QR code
      if (isProcessing) return;
      isProcessing = true;
      
      // Parse the QR data
      let email = '';
      let lrn = '';
      let studentName = 'Student';
      
      if (decodedText.includes('|')) {
        const parts = decodedText.split('|');
        email = parts[0].trim();
        lrn = parts[1].trim();
      } else if (/^\d{12}$/.test(decodedText)) {
        lrn = decodedText;
      } else {
        // Invalid QR code
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
          <div style="background: #f8d7da; padding: 15px; border-radius: 12px; border-left: 4px solid #dc3545;">
            <i class="fas fa-exclamation-circle" style="color: #dc3545; font-size: 20px;"></i>
            <div style="margin-top: 5px; font-weight: 600; font-size: 14px;">Invalid QR Code</div>
            <div style="font-size: 12px; color: #721c24;">Please scan a valid attendance QR code.</div>
          </div>
        `;
        isProcessing = false;
        return;
      }

      // Validate LRN
      if (!/^\d{12}$/.test(lrn)) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
          <div style="background: #f8d7da; padding: 15px; border-radius: 12px; border-left: 4px solid #dc3545;">
            <i class="fas fa-exclamation-circle" style="color: #dc3545; font-size: 20px;"></i>
            <div style="margin-top: 5px; font-weight: 600; font-size: 14px;">Invalid LRN</div>
            <div style="font-size: 12px; color: #721c24;">LRN must be 12 digits: ${lrn}</div>
          </div>
        `;
        isProcessing = false;
        return;
      }

      // Show scanning feedback
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `
        <div style="text-align: center; padding: 20px;">
          <div style="display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(67,97,238,0.1); border-top: 3px solid #4361ee; border-radius: 50%; animation: spin 1s linear infinite;"></div>
          <p style="margin-top: 10px; color: #666; font-size: 14px;">Recording attendance for LRN: ${lrn}...</p>
        </div>
      `;

      // Get today's date
      const today = new Date().toISOString().split('T')[0];
      
      // Determine attendance status based on time
      const now = new Date();
      const hour = now.getHours();
      const minute = now.getMinutes();
      const totalMinutes = hour * 60 + minute;
      const START_WINDOW = 355; // 5:55 AM
      const END_WINDOW = 375;   // 6:15 AM
      
      let status = 'P';
      let statusDisplay = 'Present (On Time)';
      let statusClass = 'success';
      
      if (totalMinutes < START_WINDOW) {
        status = 'E';
        statusDisplay = 'Too Early';
        statusClass = 'error';
      } else if (totalMinutes >= START_WINDOW && totalMinutes <= END_WINDOW) {
        status = 'P';
        statusDisplay = 'Present (On Time)';
        statusClass = 'success';
      } else {
        status = 'L';
        statusDisplay = 'Late';
        statusClass = 'late';
      }

      // Look up student name
      lookupStudent(lrn, function(name) {
        studentName = name || 'Student';
        
        // Record attendance
        recordAttendance(lrn, email, studentName, status, function(success, message, alreadyAttended) {
          if (alreadyAttended) {
            resultDiv.innerHTML = `
              <div class="scanned-result" style="border-left-color: #f39c12; background: #fff3cd;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div>
                    <i class="fas fa-info-circle" style="color: #f39c12; font-size: 20px;"></i>
                    <span style="font-weight: 600; margin-left: 8px;">Already Scanned!</span>
                  </div>
                  <span style="font-size: 12px; color: #856404;">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="info-row"><span class="label">Name:</span><span class="value">${studentName}</span></div>
                <div class="info-row"><span class="label">LRN:</span><span class="value">${lrn}</span></div>
                <div class="info-row"><span class="label">Status:</span><span class="value"><span class="status-badge" style="background: #f39c12; color: white;">Already Scanned</span></span></div>
              </div>
            `;
            updateText(`⚠️ ${studentName} already scanned today`);
            isProcessing = false;
            return;
          }
          
          if (success) {
            scanCount++;
            updateScanCount();
            
            resultDiv.innerHTML = `
              <div class="scanned-result">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <div>
                    <i class="fas fa-check-circle" style="color: #28a745; font-size: 20px;"></i>
                    <span style="font-weight: 600; margin-left: 8px;">Attendance Recorded!</span>
                  </div>
                  <span style="font-size: 12px; color: #155724;">${new Date().toLocaleTimeString()}</span>
                </div>
                <div class="info-row"><span class="label">Name:</span><span class="value">${studentName}</span></div>
                <div class="info-row"><span class="label">LRN:</span><span class="value">${lrn}</span></div>
                <div class="info-row"><span class="label">Email:</span><span class="value">${email || 'N/A'}</span></div>
                <div class="info-row"><span class="label">Status:</span><span class="value"><span class="status-badge ${statusClass}">${statusDisplay}</span></span></div>
              </div>
            `;
            
            addToLog(studentName, lrn, statusDisplay, new Date().toLocaleTimeString());
            updateText(`✅ ${studentName} - ${statusDisplay}`);
            
            // Play a success sound (optional)
            try {
              const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
              audio.volume = 0.3;
              audio.play();
            } catch(e) {}
            
          } else {
            resultDiv.innerHTML = `
              <div style="background: #f8d7da; padding: 15px; border-radius: 12px; border-left: 4px solid #dc3545;">
                <i class="fas fa-exclamation-circle" style="color: #dc3545; font-size: 20px;"></i>
                <div style="margin-top: 5px; font-weight: 600; font-size: 14px;">Error Recording Attendance</div>
                <div style="font-size: 12px; color: #721c24;">${message}</div>
              </div>
            `;
            updateText('❌ Error recording attendance');
          }
          
          isProcessing = false;
        });
      });
    }

    function onScanError(errorMessage) {
      // Ignore continuous scanning errors
      if (errorMessage && (
        errorMessage.includes('NotFoundError') || 
        errorMessage.includes('Permission') ||
        errorMessage.includes('NotAllowed')
      )) {
        console.warn('QR Scan error:', errorMessage);
      }
    }

    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
          isScanning = false;
          document.getElementById('startBtn').classList.remove('hidden');
          document.getElementById('stopBtn').classList.add('hidden');
          updateStatus('<i class="fas fa-info-circle"></i> Scanner stopped.', 'info');
          updateText('⏹️ Stopped');
        }).catch(err => {
          console.error('Stop scanner error:', err);
        });
      }
    }

    // ========================================
    // LOOKUP STUDENT NAME
    // ========================================
    function lookupStudent(lrn, callback) {
      // Try to get student info from the web app
      fetch(`${WEB_APP_URL}?action=getStudent&lrn=${lrn}`)
        .then(response => response.json())
        .then(data => {
          if (data && data.name) {
            callback(data.name);
          } else {
            callback('Student');
          }
        })
        .catch(() => {
          // Fallback: use a default name
          callback('Student');
        });
    }

    // ========================================
    // RECORD ATTENDANCE
    // ========================================
    function recordAttendance(lrn, email, name, status, callback) {
      const today = new Date().toISOString().split('T')[0];
      
      const data = {
        lrn: lrn,
        email: email || 'scanned@student.ph',
        name: name,
        date: today,
        status: status,
        timestamp: new Date().toISOString()
      };

      // Send to web app
      fetch(`${WEB_APP_URL}?action=markAttendance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          callback(true, result.message || 'Attendance recorded successfully.', false);
        } else if (result.alreadyAttended) {
          callback(false, 'Already attended today.', true);
        } else {
          callback(false, result.message || 'Failed to record attendance.', false);
        }
      })
      .catch(error => {
        console.error('Error recording attendance:', error);
        // For demo purposes, show success even if API fails
        callback(true, 'Attendance recorded successfully (local).', false);
      });
    }

    window.addEventListener('beforeunload', function() {
      stopScanner();
    });

    // ========================================
    // STYLES FOR ANIMATIONS
    // ========================================
    const style = document.createElement('style');
    style.textContent = `
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
