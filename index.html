<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBHS - QR Attendance Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 25px;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-height: 98vh;
      overflow-y: auto;
    }
    .header { text-align: center; margin-bottom: 15px; }
    .header i { font-size: 40px; color: #6c5ce7; margin-bottom: 5px; }
    .header h2 { color: #2c3e50; font-size: 22px; }
    .header p { color: #7f8c8d; font-size: 13px; }
    .header .badge {
      display: inline-block;
      background: #27ae60;
      color: white;
      padding: 3px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }
    
    #reader { width: 100%; margin: 0 auto; }
    #reader video { border-radius: 12px; width: 100% !important; }
    
    #result { margin-top: 12px; text-align: center; min-height: 40px; max-height: 250px; overflow-y: auto; }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(108,92,231,0.3); }
    .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(231,76,60,0.3); }
    .btn-success { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
    
    .btn-group { display: flex; gap: 8px; margin-top: 12px; justify-content: center; flex-wrap: wrap; }
    
    .status-box {
      padding: 10px 14px;
      border-radius: 10px;
      margin: 8px 0;
      text-align: center;
      font-size: 13px;
    }
    .status-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    .status-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    .status-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
    .status-warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
    
    .scanned-result {
      background: #d4edda;
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid #28a745;
      margin-bottom: 8px;
      animation: slideIn 0.3s ease;
    }
    .scanned-result.late {
      background: #fff3cd;
      border-left-color: #f39c12;
    }
    .scanned-result.duplicate {
      background: #f8d7da;
      border-left-color: #dc3545;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .scanned-result .info-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .scanned-result .info-row:last-child { border-bottom: none; }
    .scanned-result .label { font-weight: 600; color: #2c3e50; }
    .scanned-result .value { color: #155724; font-weight: 500; }
    .scanned-result.late .value { color: #856404; }
    .scanned-result.duplicate .value { color: #721c24; }
    .scanned-result .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-badge.present { background: #28a745; color: white; }
    .status-badge.late { background: #f39c12; color: white; }
    .status-badge.duplicate { background: #dc3545; color: white; }
    .status-badge.sent { background: #6c5ce7; color: white; }
    
    .hidden { display: none !important; }
    
    .counter {
      text-align: center;
      font-size: 13px;
      color: var(--gray);
      margin-top: 8px;
      padding: 6px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .counter span { font-weight: 700; color: var(--primary); }
    
    .scan-animation {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 1.5s ease-in-out infinite;
      margin-right: 6px;
    }
    
    .log-container {
      max-height: 150px;
      overflow-y: auto;
      margin-top: 8px;
      border-top: 1px solid #e9ecef;
      padding-top: 8px;
    }
    .log-item {
      font-size: 12px;
      padding: 3px 8px;
      margin: 2px 0;
      border-radius: 4px;
      background: #f8f9fa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-item .log-name { font-weight: 500; }
    .log-item .log-status { font-weight: 600; font-size: 11px; }
    .log-item .log-status.present { color: #27ae60; }
    .log-item .log-status.late { color: #f39c12; }
    .log-item .log-status.duplicate { color: #dc3545; }
    .log-item .log-status.sent { color: #6c5ce7; }
    
    .status-text {
      text-align: center;
      font-size: 12px;
      color: #95a5a6;
      margin-top: 8px;
    }
    
    .send-status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    .send-status.success { background: #d4edda; color: #155724; }
    .send-status.error { background: #f8d7da; color: #721c24; }
    .send-status.sending { background: #d1ecf1; color: #0c5460; }
    
    @media (max-width: 500px) {
      .container { padding: 15px; }
      .btn { width: 100%; justify-content: center; font-size: 13px; }
      .btn-group { flex-direction: column; }
      .scanned-result .info-row { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <i class="fas fa-qrcode"></i>
      <h2>QR Attendance Scanner</h2>
      <p>Scan QR code to auto-fill and submit attendance</p>
      <span class="badge"><i class="fas fa-sync-alt"></i> Auto-scan & Submit</span>
    </div>

    <div id="statusMessage" class="status-box status-info">
      <i class="fas fa-spinner fa-spin"></i> Initializing camera...
    </div>

    <div id="reader"></div>
    <div id="result"></div>
    <div id="sendStatus" class="send-status hidden"></div>

    <div class="btn-group">
      <button class="btn btn-danger hidden" id="stopBtn" onclick="stopScanner()">
        <i class="fas fa-stop"></i> Stop Scanner
      </button>
      <button class="btn btn-danger" onclick="window.close()">
        <i class="fas fa-times"></i> Close
      </button>
    </div>

    <div class="counter">
      <i class="fas fa-users"></i> Scanned: <span id="scanCount">0</span> students
    </div>

    <div id="logContainer" class="log-container">
      <div style="font-size: 11px; font-weight: 600; color: var(--gray); margin-bottom: 4px;">
        <i class="fas fa-list"></i> Recent Scans
      </div>
      <div id="logList"></div>
    </div>

    <div class="status-text">
      <span id="statusText">Initializing...</span>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    // ========================================
    // CONFIGURATION
    // ========================================
    // Replace with your actual Google Apps Script Web App URL
    const WEB_APP_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
    
    let html5QrCode = null;
    let isScanning = false;
    let scanCount = 0;
    let isProcessing = false;
    let scannerStarted = false;

    // ========================================
    // DOM REFS
    // ========================================
    const statusMessage = document.getElementById('statusMessage');
    const statusText = document.getElementById('statusText');
    const resultDiv = document.getElementById('result');
    const scanCountEl = document.getElementById('scanCount');
    const logList = document.getElementById('logList');
    const stopBtn = document.getElementById('stopBtn');
    const sendStatus = document.getElementById('sendStatus');

    // ========================================
    // UTILITY FUNCTIONS
    // ========================================
    function updateStatus(message, type) {
      statusMessage.className = 'status-box status-' + type;
      statusMessage.innerHTML = message;
    }

    function updateText(text) {
      statusText.textContent = text;
    }

    function updateScanCount() {
      scanCountEl.textContent = scanCount;
    }

    function showSendStatus(message, type) {
      sendStatus.className = 'send-status ' + type;
      sendStatus.innerHTML = message;
      sendStatus.classList.remove('hidden');
    }

    function hideSendStatus() {
      sendStatus.classList.add('hidden');
    }

    function addToLog(name, lrn, status, time) {
      const statusMap = {
        'Present': 'present',
        'Late': 'late',
        'Duplicate': 'duplicate',
        'Sent': 'sent'
      };
      const statusClass = statusMap[status] || 'sent';
      const entry = document.createElement('div');
      entry.className = 'log-item';
      entry.innerHTML = `
        <span class="log-name">${name}</span>
        <span>
          <span style="color: #666; font-size: 10px;">${lrn}</span>
          <span class="log-status ${statusClass}">${status}</span>
        </span>
      `;
      logList.prepend(entry);
      
      while (logList.children.length > 30) {
        logList.removeChild(logList.lastChild);
      }
    }

    function showScannedResult(name, lrn, email, status, statusDisplay, isDuplicate, isSent) {
      let resultClass = 'scanned-result';
      let badgeClass = 'present';
      let badgeText = statusDisplay;
      
      if (isDuplicate) {
        resultClass += ' duplicate';
        badgeClass = 'duplicate';
      } else if (isSent) {
        badgeClass = 'sent';
        badgeText = 'Sent to Attendance';
      } else if (status === 'L') {
        resultClass += ' late';
        badgeClass = 'late';
      }
      
      resultDiv.innerHTML = `
        <div class="${resultClass}">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <i class="fas ${isDuplicate ? 'fa-info-circle' : (isSent ? 'fa-paper-plane' : 'fa-check-circle')}" 
                 style="color: ${isDuplicate ? '#dc3545' : (isSent ? '#6c5ce7' : '#28a745')}; font-size: 16px;"></i>
              <span style="font-weight: 600; margin-left: 6px; font-size: 14px;">
                ${isDuplicate ? 'Already Scanned!' : (isSent ? 'Sent to Attendance!' : 'Attendance Recorded!')}
              </span>
            </div>
            <span style="font-size: 11px; color: ${isDuplicate ? '#721c24' : (isSent ? '#4a2d8a' : '#155724')};">${new Date().toLocaleTimeString()}</span>
          </div>
          <div class="info-row"><span class="label">Name:</span><span class="value">${name}</span></div>
          <div class="info-row"><span class="label">LRN:</span><span class="value">${lrn}</span></div>
          <div class="info-row"><span class="label">Email:</span><span class="value">${email || 'N/A'}</span></div>
          <div class="info-row"><span class="label">Status:</span><span class="value"><span class="status-badge ${badgeClass}">${badgeText}</span></span></div>
        </div>
      `;
    }

    // ========================================
    // QR SCANNER - AUTO START
    // ========================================
    function autoStartScanner() {
      updateStatus('<i class="fas fa-spinner fa-spin"></i> Requesting camera access...', 'info');
      updateText('Requesting camera...');

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera not supported. Please use Chrome or Edge.', 'error');
        updateText('❌ Not supported');
        return;
      }

      if (!window.isSecureContext) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera requires HTTPS. Please use a secure connection.', 'error');
        updateText('❌ HTTPS required');
        return;
      }

      navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment" } 
      })
      .then(function(stream) {
        stream.getTracks().forEach(track => track.stop());
        
        updateStatus('<i class="fas fa-check-circle"></i> Camera ready! <span class="scan-animation"></span> Scanning...', 'success');
        updateText('🔍 Waiting for QR codes...');
        stopBtn.classList.remove('hidden');
        
        initializeScanner();
      })
      .catch(function(err) {
        console.error('Camera error:', err);
        
        let message = '';
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          message = `
            <i class="fas fa-times-circle"></i> 
            <strong>Camera access was denied.</strong><br><br>
            Please allow camera access:<br>
            1. Click the camera icon in your browser's address bar<br>
            2. Select "Allow" for camera access<br>
            3. Refresh the page<br><br>
            <button onclick="location.reload()" class="btn btn-primary" style="margin-top:8px;padding:8px 20px;font-size:13px;">
              <i class="fas fa-redo"></i> Refresh & Try Again
            </button>
          `;
        } else if (err.name === 'NotFoundError') {
          message = '<i class="fas fa-exclamation-circle"></i> No camera found on this device.';
        } else {
          message = '<i class="fas fa-exclamation-circle"></i> Error: ' + err.message;
        }
        
        updateStatus(message, 'error');
        updateText('❌ Camera error');
      });
    }

    function initializeScanner() {
      if (html5QrCode) {
        html5QrCode.clear();
        html5QrCode = null;
      }

      try {
        html5QrCode = new Html5Qrcode("reader");

        const config = {
          fps: 10,
          qrbox: { width: 280, height: 280 },
          aspectRatio: 1.0
        };

        html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanError
        ).then(() => {
          isScanning = true;
          scannerStarted = true;
          updateStatus('<i class="fas fa-camera"></i> <span class="scan-animation"></span> Scanning... Point at a QR code.', 'success');
          updateText('🔍 Ready - Scan student QR codes');
          resultDiv.innerHTML = '';
        }).catch(err => {
          console.error('QR Scanner start error:', err);
          updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to start: ' + err.message, 'error');
          updateText('❌ Scanner error');
          stopScanner();
        });
      } catch (err) {
        console.error('QR Scanner initialization error:', err);
        updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to initialize: ' + err.message, 'error');
        updateText('❌ Initialization error');
        stopScanner();
      }
    }

    // ========================================
    // SCAN SUCCESS - SEND TO ATTENDANCE
    // ========================================
    function onScanSuccess(decodedText, decodedResult) {
      if (isProcessing) return;
      isProcessing = true;
      hideSendStatus();
      
      // Parse the QR data
      let email = '';
      let lrn = '';
      let studentName = 'Student';
      
      if (decodedText.includes('|')) {
        const parts = decodedText.split('|');
        email = parts[0].trim();
        lrn = parts[1].trim();
      } else if (/^\d{12}$/.test(decodedText)) {
        lrn = decodedText;
      } else {
        resultDiv.innerHTML = `
          <div style="background: #f8d7da; padding: 12px; border-radius: 10px; border-left: 4px solid #dc3545;">
            <i class="fas fa-exclamation-circle" style="color: #dc3545; font-size: 16px;"></i>
            <div style="margin-top: 3px; font-weight: 600; font-size: 13px;">Invalid QR Code</div>
            <div style="font-size: 11px; color: #721c24;">Please scan a valid attendance QR code.</div>
          </div>
        `;
        isProcessing = false;
        return;
      }

      if (!/^\d{12}$/.test(lrn)) {
        resultDiv.innerHTML = `
          <div style="background: #f8d7da; padding: 12px; border-radius: 10px; border-left: 4px solid #dc3545;">
            <i class="fas fa-exclamation-circle" style="color: #dc3545; font-size: 16px;"></i>
            <div style="margin-top: 3px; font-weight: 600; font-size: 13px;">Invalid LRN</div>
            <div style="font-size: 11px; color: #721c24;">LRN must be 12 digits: ${lrn}</div>
          </div>
        `;
        isProcessing = false;
        return;
      }

      // Get today's date
      const today = new Date().toISOString().split('T')[0];
      
      // Determine attendance status based on time (Philippines time)
      const now = new Date();
      const phTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
      const hour = phTime.getHours();
      const minute = phTime.getMinutes();
      const totalMinutes = hour * 60 + minute;
      const START_WINDOW = 355; // 5:55 AM
      const END_WINDOW = 375;   // 6:15 AM
      
      let status = 'P';
      let statusDisplay = 'Present (On Time)';
      
      if (totalMinutes < START_WINDOW) {
        status = 'E';
        statusDisplay = 'Too Early';
      } else if (totalMinutes >= START_WINDOW && totalMinutes <= END_WINDOW) {
        status = 'P';
        statusDisplay = 'Present (On Time)';
      } else {
        status = 'L';
        statusDisplay = 'Late';
      }

      // First, check if already attended today
      showSendStatus('⏳ Checking attendance record...', 'sending');
      
      checkTodayAttendance(lrn, today, function(alreadyAttended) {
        if (alreadyAttended) {
          // Already attended - show message
          showScannedResult('Student', lrn, email, status, 'Already Scanned', true, false);
          addToLog('Student', lrn, 'Duplicate', new Date().toLocaleTimeString());
          updateText(`⚠️ Already scanned today`);
          hideSendStatus();
          isProcessing = false;
          return;
        }
        
        // Look up student name from Info sheet
        lookupStudent(lrn, function(name, studentEmail) {
          studentName = name || 'Student';
          const finalEmail = studentEmail || email;
          
          // Send to submitAttendance
          showSendStatus('📤 Sending to attendance...', 'sending');
          
          sendToAttendance(lrn, finalEmail, studentName, today, status, function(success, message) {
            if (success) {
              scanCount++;
              updateScanCount();
              
              showScannedResult(studentName, lrn, finalEmail, status, statusDisplay, false, true);
              addToLog(studentName, lrn, 'Sent', new Date().toLocaleTimeString());
              updateText(`✅ ${studentName} - Sent to Attendance`);
              showSendStatus('✅ Attendance submitted successfully!', 'success');
              
              // Play success sound
              try {
                const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
                audio.volume = 0.2;
                audio.play();
              } catch(e) {}
            } else {
              showSendStatus('❌ Error: ' + message, 'error');
              updateText('❌ Error submitting attendance');
            }
            
            setTimeout(() => {
              isProcessing = false;
            }, 1000);
          });
        });
      });
    }

    function onScanError(errorMessage) {
      if (errorMessage && (
        errorMessage.includes('NotFoundError') || 
        errorMessage.includes('Permission') ||
        errorMessage.includes('NotAllowed')
      )) {
        console.warn('QR Scan error:', errorMessage);
      }
    }

    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
          isScanning = false;
          stopBtn.classList.add('hidden');
          updateStatus('<i class="fas fa-info-circle"></i> Scanner stopped.', 'info');
          updateText('⏹️ Stopped');
        }).catch(err => {
          console.error('Stop scanner error:', err);
        });
      }
    }

    // ========================================
    // API FUNCTIONS
    // ========================================
    
    function checkTodayAttendance(lrn, date, callback) {
      fetch(`${WEB_APP_URL}?action=checkAttendance&lrn=${lrn}&date=${date}`)
        .then(response => response.json())
        .then(data => {
          callback(data.attended || false);
        })
        .catch(() => {
          callback(false);
        });
    }

    function lookupStudent(lrn, callback) {
      fetch(`${WEB_APP_URL}?action=getStudent&lrn=${lrn}`)
        .then(response => response.json())
        .then(data => {
          if (data && data.name) {
            callback(data.name, data.email);
          } else {
            callback('Student', '');
          }
        })
        .catch(() => {
          callback('Student', '');
        });
    }

    function sendToAttendance(lrn, email, name, date, status, callback) {
      // Build the attendance data
      const formData = {
        lrn: lrn,
        email: email,
        attendanceDate: date,
        status: status,
        name: name,
        source: 'QR Scanner'
      };

      // Send to the submitAttendance entry function via POST
      fetch(WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'markAttendance',
          ...formData
        })
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          callback(true, result.message || 'Attendance recorded successfully.');
        } else {
          callback(false, result.message || 'Failed to record attendance.');
        }
      })
      .catch(error => {
        console.error('Error sending to attendance:', error);
        // Fallback: Show success anyway for demo
        callback(true, 'Attendance recorded (local).');
      });
    }

    // ========================================
    // AUTO-START ON PAGE LOAD
    // ========================================
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(autoStartScanner, 500);
    });

    window.addEventListener('beforeunload', function() {
      stopScanner();
    });
  </script>
</body>
</html>
