<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MBHS - QR Attendance Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      touch-action: manipulation;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 25px;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-height: 98vh;
      overflow-y: auto;
    }
    .header { text-align: center; margin-bottom: 15px; }
    .header i { font-size: 40px; color: #6c5ce7; margin-bottom: 5px; }
    .header h2 { color: #2c3e50; font-size: 22px; }
    .header p { color: #7f8c8d; font-size: 13px; }
    
    #reader-container {
      width: 100%;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #reader-container video {
      width: 100% !important;
      height: auto !important;
      display: block;
      transform: scaleX(-1); /* Mirror front camera */
    }
    #reader-container canvas {
      display: none;
    }
    
    #scan-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      border: 3px solid rgba(108, 92, 231, 0.8);
      border-radius: 12px;
      box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.3);
      pointer-events: none;
      display: none;
    }
    #scan-overlay.active {
      display: block;
    }
    #scan-overlay .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: #6c5ce7;
      border-style: solid;
      border-width: 0;
    }
    #scan-overlay .corner.tl { top: -3px; left: -3px; border-top-width: 4px; border-left-width: 4px; border-radius: 4px 0 0 0; }
    #scan-overlay .corner.tr { top: -3px; right: -3px; border-top-width: 4px; border-right-width: 4px; border-radius: 0 4px 0 0; }
    #scan-overlay .corner.bl { bottom: -3px; left: -3px; border-bottom-width: 4px; border-left-width: 4px; border-radius: 0 0 0 4px; }
    #scan-overlay .corner.br { bottom: -3px; right: -3px; border-bottom-width: 4px; border-right-width: 4px; border-radius: 0 0 4px 0; }
    
    #result { margin-top: 12px; text-align: center; min-height: 40px; max-height: 300px; overflow-y: auto; }
    
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      touch-action: manipulation;
      min-height: 48px;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; }
    .btn-primary:active { transform: scale(0.95); }
    .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-danger:active { transform: scale(0.95); }
    .btn-success { background: linear-gradient(135deg, #28a745, #20c997); color: white; }
    .btn-success:active { transform: scale(0.95); }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:active { transform: scale(0.95); }
    .btn-warning { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
    .btn-warning:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .btn-group { 
      display: flex; 
      gap: 8px; 
      margin-top: 12px; 
      justify-content: center; 
      flex-wrap: wrap; 
    }
    .btn-group .btn { flex: 1; min-width: 100px; }
    
    .status-box {
      padding: 10px 14px;
      border-radius: 10px;
      margin: 8px 0;
      text-align: center;
      font-size: 13px;
    }
    .status-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    .status-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    .status-info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
    .status-warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
    
    .scanned-result {
      background: #d4edda;
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid #28a745;
      margin-bottom: 8px;
      animation: slideIn 0.3s ease;
    }
    .scanned-result .info-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .scanned-result .info-row:last-child { border-bottom: none; }
    .scanned-result .label { font-weight: 600; color: #2c3e50; }
    .scanned-result .value { color: #155724; font-weight: 500; }
    
    .hidden { display: none !important; }
    
    .counter {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      padding: 6px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .counter span { font-weight: 700; color: #6c5ce7; }
    
    .scan-animation {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 1.5s ease-in-out infinite;
      margin-right: 6px;
    }
    
    .status-text {
      text-align: center;
      font-size: 12px;
      color: #95a5a6;
      margin-top: 8px;
    }
    
    .send-status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }
    .send-status.success { background: #d4edda; color: #155724; }
    .send-status.error { background: #f8d7da; color: #721c24; }
    .send-status.sending { background: #d1ecf1; color: #0c5460; }
    
    .server-datetime {
      background: #f0f2f5;
      padding: 10px 14px;
      border-radius: 8px;
      margin: 10px 0;
      text-align: center;
      font-size: 13px;
      color: #2c3e50;
      border: 1px solid #e4e6eb;
    }
    .server-datetime i { color: #6c5ce7; margin-right: 6px; }
    .server-datetime .date { font-weight: 600; }
    .server-datetime .time { font-weight: 600; color: #6c5ce7; }
    
    .attendance-status {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 4px;
    }
    .attendance-status.on-time { background: #d4edda; color: #155724; }
    .attendance-status.late { background: #fff3cd; color: #856404; }
    .attendance-status.early { background: #d1ecf1; color: #0c5460; }
    
    .manual-input {
      margin-top: 12px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
      border: 1px solid #e4e6eb;
    }
    .manual-input label {
      font-size: 13px;
      font-weight: 600;
      color: #2c3e50;
      display: block;
      margin-bottom: 5px;
    }
    .manual-input input {
      width: 100%;
      padding: 10px;
      border: 2px solid #dce0e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 8px;
    }
    .manual-input input:focus {
      outline: none;
      border-color: #6c5ce7;
    }
    .manual-input .btn-group {
      margin-top: 0;
    }
    .manual-input .btn-group .btn {
      flex: 1;
    }
    
    .browser-check {
      background: #fff3cd;
      padding: 10px;
      border-radius: 8px;
      margin: 8px 0;
      font-size: 12px;
      color: #856404;
      border: 1px solid #ffc107;
    }
    .browser-check strong { color: #d39e00; }
    
    .camera-switch {
      text-align: center;
      margin-top: 8px;
    }
    .camera-switch .btn {
      padding: 8px 16px;
      font-size: 13px;
      min-height: 36px;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    @media (max-width: 500px) {
      .container { padding: 15px; }
      .btn { font-size: 14px; }
      .btn-group { flex-direction: column; }
      .btn-group .btn { flex: none; width: 100%; }
      #scan-overlay { width: 150px; height: 150px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <i class="fas fa-qrcode"></i>
      <h2>QR Attendance Scanner</h2>
      <p>Scan QR code to auto-fill attendance form</p>
    </div>

    <!-- Browser Compatibility Check -->
    <div class="browser-check" id="browserCheck">
      <i class="fas fa-info-circle"></i> 
      <strong>Device:</strong> <span id="deviceInfo">Checking...</span>
    </div>

    <div class="server-datetime" id="serverDateTime">
      <i class="fas fa-calendar-day"></i>
      <span class="date" id="serverDate">Loading date...</span>
      <span style="margin: 0 6px;">|</span>
      <i class="fas fa-clock"></i>
      <span class="time" id="serverTime">Loading time...</span>
      <br>
      <span class="attendance-status on-time" id="attendanceStatus">✓ On Time</span>
    </div>

    <div id="statusMessage" class="status-box status-info">
      <i class="fas fa-spinner fa-spin"></i> Initializing...
    </div>

    <div id="reader-container">
      <div id="reader"></div>
      <div id="scan-overlay">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
    </div>
    
    <!-- Camera Switch Button -->
    <div class="camera-switch">
      <button class="btn btn-secondary" id="switchCameraBtn">
        <i class="fas fa-sync-alt"></i> Switch Camera
      </button>
    </div>
    
    <div id="result"></div>
    <div id="sendStatus" class="send-status hidden"></div>

    <div class="btn-group">
      <button class="btn btn-primary" id="startBtn">
        <i class="fas fa-camera"></i> Start Camera
      </button>
      <button class="btn btn-danger hidden" id="stopBtn">
        <i class="fas fa-stop"></i> Stop
      </button>
      <button class="btn btn-secondary" onclick="window.close()">
        <i class="fas fa-times"></i> Close
      </button>
    </div>

    <!-- Manual LRN Input (Fallback) -->
    <div class="manual-input">
      <label for="manualLRN"><i class="fas fa-keyboard"></i> Manual Entry (if camera not working):</label>
      <input type="text" id="manualLRN" placeholder="Enter 12-digit LRN" maxlength="12" pattern="[0-9]*" inputmode="numeric">
      <div class="btn-group">
        <button class="btn btn-success" id="manualSubmitBtn">
          <i class="fas fa-check"></i> Submit LRN
        </button>
        <button class="btn btn-warning" id="testQRBtn">
          <i class="fas fa-qrcode"></i> Test QR
        </button>
      </div>
    </div>

    <div class="counter">
      <i class="fas fa-users"></i> Scanned: <span id="scanCount">0</span> students
    </div>

    <div class="status-text">
      <span id="statusText">Ready</span>
    </div>
  </div>

  <script>
    // ========================================
    // POLYFILLS FOR OLDER BROWSERS
    // ========================================
    if (!Array.prototype.forEach) {
      Array.prototype.forEach = function(callback, thisArg) {
        for (var i = 0; i < this.length; i++) {
          callback.call(thisArg, this[i], i, this);
        }
      };
    }

    if (!Object.keys) {
      Object.keys = function(obj) {
        var keys = [];
        for (var key in obj) {
          if (obj.hasOwnProperty(key)) {
            keys.push(key);
          }
        }
        return keys;
      };
    }

    // ========================================
    // CONFIGURATION
    // ========================================
    var SCRIPT_ID = 'AKfycbys-BkQT0jRnPC6q5neSRj6JqmOFG_BKa2luh1uI7gwYjaHRDOYmMCOvBDqbV7V310PrA';
    
    function getWebAppUrl() {
      return 'https://script.google.com/macros/s/' + SCRIPT_ID + '/exec';
    }
    
    var html5QrCode = null;
    var isScanning = false;
    var scanCount = 0;
    var isProcessing = false;
    var serverDateTime = {};
    var scannerInitialized = false;
    var videoStream = null;
    var isUsingFallback = false;
    var scannerStartAttempts = 0;
    var maxScannerAttempts = 3;
    var currentFacingMode = 'user'; // 'user' for front camera, 'environment' for back camera
    var isMirrored = true; // Mirror front camera

    // ========================================
    // DOM REFS
    // ========================================
    var statusMessage = document.getElementById('statusMessage');
    var statusText = document.getElementById('statusText');
    var resultDiv = document.getElementById('result');
    var scanCountEl = document.getElementById('scanCount');
    var stopBtn = document.getElementById('stopBtn');
    var startBtn = document.getElementById('startBtn');
    var switchCameraBtn = document.getElementById('switchCameraBtn');
    var sendStatus = document.getElementById('sendStatus');
    var serverDateEl = document.getElementById('serverDate');
    var serverTimeEl = document.getElementById('serverTime');
    var attendanceStatusEl = document.getElementById('attendanceStatus');
    var readerContainer = document.getElementById('reader-container');
    var scanOverlay = document.getElementById('scan-overlay');
    var manualLRN = document.getElementById('manualLRN');
    var manualSubmitBtn = document.getElementById('manualSubmitBtn');
    var testQRBtn = document.getElementById('testQRBtn');

    // ========================================
    // BROWSER COMPATIBILITY CHECK
    // ========================================
    function checkBrowserCompatibility() {
      var deviceInfo = document.getElementById('deviceInfo');
      var ua = navigator.userAgent;
      var isMobile = /Android|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(ua);
      var browserName = 'Unknown';
      var isOldBrowser = false;
      var browserVersion = 0;
      
      if (ua.indexOf('Chrome') > -1) {
        browserName = 'Chrome';
        var chromeMatch = ua.match(/Chrome\/(\d+)/);
        if (chromeMatch) {
          browserVersion = parseInt(chromeMatch[1]);
          if (browserVersion < 60) isOldBrowser = true;
        }
      } else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) {
        browserName = 'Safari';
        var safariMatch = ua.match(/Version\/(\d+)/);
        if (safariMatch) {
          browserVersion = parseInt(safariMatch[1]);
          if (browserVersion < 12) isOldBrowser = true;
        }
      } else if (ua.indexOf('Firefox') > -1) {
        browserName = 'Firefox';
        var ffMatch = ua.match(/Firefox\/(\d+)/);
        if (ffMatch) {
          browserVersion = parseInt(ffMatch[1]);
          if (browserVersion < 50) isOldBrowser = true;
        }
      } else if (ua.indexOf('Edge') > -1) {
        browserName = 'Edge';
        var edgeMatch = ua.match(/Edge\/(\d+)/);
        if (edgeMatch) {
          browserVersion = parseInt(edgeMatch[1]);
          if (browserVersion < 79) isOldBrowser = true;
        }
      }
      
      var deviceInfoText = browserName;
      if (browserVersion > 0) {
        deviceInfoText += ' ' + browserVersion;
      }
      deviceInfoText += isMobile ? ' (Mobile)' : ' (Desktop)';
      
      if (isOldBrowser) {
        deviceInfoText += ' ⚠️ Older version - using compatibility mode';
        var checkDiv = document.getElementById('browserCheck');
        checkDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' +
          '<strong>Note:</strong> Your browser version is older. Using compatibility mode. Manual entry is always available.';
        checkDiv.style.background = '#f8d7da';
        checkDiv.style.color = '#721c24';
        checkDiv.style.borderColor = '#dc3545';
        document.querySelector('.manual-input').style.borderColor = '#dc3545';
        document.querySelector('.manual-input').style.borderWidth = '2px';
      } else {
        deviceInfoText += ' ✓ Updated';
      }
      
      deviceInfo.textContent = deviceInfoText;
      
      if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
        document.getElementById('browserCheck').innerHTML += 
          '<br><i class="fas fa-lock"></i> <strong>HTTPS required</strong> for camera access.';
      }
    }

    // ========================================
    // SERVER DATE/TIME FUNCTIONS
    // ========================================
    function loadServerDateTime() {
      var url = getWebAppUrl() + '?action=getServerDateTime';
      
      if (typeof fetch === 'function') {
        fetch(url)
          .then(function(response) { return response.json(); })
          .then(function(data) {
            serverDateTime = data;
            updateServerDisplay(data);
          })
          .catch(function() {
            fallbackDateTime();
          });
      } else {
        loadServerDateTimeXHR();
      }
    }

    function loadServerDateTimeXHR() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', getWebAppUrl() + '?action=getServerDateTime', true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            serverDateTime = data;
            updateServerDisplay(data);
          } catch(e) {
            fallbackDateTime();
          }
        } else if (xhr.readyState === 4) {
          fallbackDateTime();
        }
      };
      xhr.send();
    }

    function fallbackDateTime() {
      var now = new Date();
      var phTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
      var dateStr = phTime.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      var timeStr = phTime.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });
      var totalMinutes = phTime.getHours() * 60 + phTime.getMinutes();
      var status = getAttendanceStatus(totalMinutes);
      updateServerDisplay({
        date: phTime.toISOString().split('T')[0],
        time: timeStr,
        status: status.status,
        statusMessage: status.message
      });
    }

    function getAttendanceStatus(totalMinutes) {
      var START_WINDOW = 355;
      var END_WINDOW = 375;
      
      if (totalMinutes < START_WINDOW) {
        return { status: 'EARLY', message: '⏰ Too early!', class: 'early' };
      } else if (totalMinutes >= START_WINDOW && totalMinutes <= END_WINDOW) {
        return { status: 'P', message: '✓ On Time', class: 'on-time' };
      } else {
        return { status: 'L', message: '⏰ LATE', class: 'late' };
      }
    }

    function updateServerDisplay(data) {
      var dateDisplay = data.date;
      try {
        var dateObj = new Date(data.date + 'T00:00:00');
        dateDisplay = dateObj.toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          timeZone: 'Asia/Manila'
        });
      } catch(e) {}
      
      serverDateEl.textContent = dateDisplay;
      serverTimeEl.textContent = data.time || data.timeFormatted || '--:--';
      
      var statusClass = 'on-time';
      var statusTextVal = '✓ On Time';
      
      if (data.status === 'EARLY') {
        statusClass = 'early';
        statusTextVal = '⏰ Too Early';
      } else if (data.status === 'L') {
        statusClass = 'late';
        statusTextVal = '⏰ LATE';
      } else {
        statusClass = 'on-time';
        statusTextVal = '✓ On Time';
      }
      
      attendanceStatusEl.className = 'attendance-status ' + statusClass;
      attendanceStatusEl.textContent = statusTextVal;
      
      serverDateTime = data;
    }

    // ========================================
    // UTILITY FUNCTIONS
    // ========================================
    function updateStatus(message, type) {
      statusMessage.className = 'status-box status-' + type;
      statusMessage.innerHTML = message;
    }

    function updateText(text) {
      statusText.textContent = text;
    }

    function updateScanCount() {
      scanCountEl.textContent = scanCount;
    }

    function showSendStatus(message, type) {
      sendStatus.className = 'send-status ' + type;
      sendStatus.innerHTML = message;
      sendStatus.classList.remove('hidden');
    }

    function hideSendStatus() {
      sendStatus.classList.add('hidden');
    }

    function showScannedResult(name, lrn, email, statusDisplay) {
      var html = '<div class="scanned-result">' +
          '<div style="display: flex; justify-content: space-between; align-items: center;">' +
            '<div>' +
              '<i class="fas fa-check-circle" style="color: #28a745; font-size: 16px;"></i>' +
              '<span style="font-weight: 600; margin-left: 6px; font-size: 14px;">QR Code detected!</span>' +
            '</div>' +
            '<span style="font-size: 11px; color: #155724;">' + new Date().toLocaleTimeString() + '</span>' +
          '</div>' +
          '<div class="info-row"><span class="label">Name:</span><span class="value">' + name + '</span></div>' +
          '<div class="info-row"><span class="label">LRN:</span><span class="value">' + lrn + '</span></div>' +
          '<div class="info-row"><span class="label">Email:</span><span class="value">' + (email || 'N/A') + '</span></div>' +
          '<div class="info-row"><span class="label">Status:</span><span class="value"><span style="background:#6c5ce7;color:white;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;">' + statusDisplay + '</span></span></div>' +
        '</div>';
      resultDiv.innerHTML = html;
    }

    function showReadyMessage() {
      resultDiv.innerHTML = '<div style="background:#d1ecf1;padding:12px;border-radius:10px;border-left:4px solid #17a2b8;text-align:center;font-size:13px;color:#0c5460;">' +
          '<i class="fas fa-camera"></i> Ready for next student. Scan another QR code.' +
        '</div>';
    }

    // ========================================
    // QR SCANNER - FRONT CAMERA VERSION
    // ========================================
    function startScannerManually() {
      scannerStartAttempts++;
      
      if (typeof Html5Qrcode !== 'undefined') {
        startModernScanner();
      } else {
        loadLibraryAndStart();
      }
    }

    function loadLibraryAndStart() {
      updateStatus('<i class="fas fa-spinner fa-spin"></i> Loading QR library...', 'info');
      
      var script = document.createElement('script');
      script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
      script.onload = function() {
        updateStatus('<i class="fas fa-check-circle"></i> Library loaded. Starting scanner...', 'success');
        setTimeout(startModernScanner, 300);
      };
      script.onerror = function() {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to load QR library. Using manual entry.', 'error');
        showManualEntryMode();
      };
      document.head.appendChild(script);
    }

    function showManualEntryMode() {
      startBtn.classList.add('hidden');
      stopBtn.classList.add('hidden');
      switchCameraBtn.classList.add('hidden');
      updateStatus('<i class="fas fa-info-circle"></i> Using manual entry mode. Enter LRN below.', 'info');
      updateText('📝 Enter LRN manually');
      scanOverlay.classList.remove('active');
      
      document.querySelector('.manual-input').style.borderColor = '#28a745';
      document.querySelector('.manual-input').style.borderWidth = '2px';
    }

    function startModernScanner() {
      if (html5QrCode) {
        try {
          html5QrCode.stop().then(function() {
            html5QrCode.clear();
            html5QrCode = null;
          }).catch(function() { html5QrCode = null; });
        } catch(e) { html5QrCode = null; }
      }

      startBtn.disabled = true;
      startBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Starting...';

      try {
        var readerElement = document.getElementById('reader');
        readerElement.innerHTML = '';
        
        if (typeof Html5Qrcode === 'undefined') {
          throw new Error('Html5Qrcode library not loaded');
        }
        
        html5QrCode = new Html5Qrcode("reader");
        scanOverlay.classList.add('active');
        
        // Apply mirror effect for front camera
        var videoElement = document.querySelector('#reader video');
        if (videoElement) {
          videoElement.style.transform = 'scaleX(-1)';
        }
        
        var config = {
          fps: 10,
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1.0
        };

        // Use 'user' for front camera (default)
        var facingMode = currentFacingMode || 'user';
        
        html5QrCode.start(
          { facingMode: facingMode },
          config,
          onScanSuccess,
          onScanError
        ).then(function() {
          isScanning = true;
          scannerInitialized = true;
          var cameraName = (facingMode === 'user') ? 'Front' : 'Back';
          updateStatus('<i class="fas fa-camera"></i> <span class="scan-animation"></span> ' + cameraName + ' camera active. Point at a QR code.', 'success');
          updateText('🔍 Ready - Scan student QR codes');
          startBtn.classList.add('hidden');
          stopBtn.classList.remove('hidden');
          switchCameraBtn.classList.remove('hidden');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
          isUsingFallback = false;
          scannerStartAttempts = 0;
          
          // Apply mirror effect for front camera
          var videoEl = document.querySelector('#reader video');
          if (videoEl && facingMode === 'user') {
            videoEl.style.transform = 'scaleX(-1)';
          } else if (videoEl) {
            videoEl.style.transform = 'scaleX(1)';
          }
        }).catch(function(err) {
          console.warn('Modern scanner failed:', err.message);
          if (scannerStartAttempts < maxScannerAttempts) {
            updateStatus('<i class="fas fa-redo"></i> Retry ' + scannerStartAttempts + '/' + maxScannerAttempts + '...', 'warning');
            setTimeout(startScannerManually, 1000);
          } else {
            startFallbackScanner();
          }
        });
      } catch (err) {
        console.warn('Scanner error:', err.message);
        if (scannerStartAttempts < maxScannerAttempts) {
          updateStatus('<i class="fas fa-redo"></i> Retry ' + scannerStartAttempts + '/' + maxScannerAttempts + '...', 'warning');
          setTimeout(startScannerManually, 1000);
        } else {
          startFallbackScanner();
        }
      }
    }

    // ========================================
    // SWITCH CAMERA
    // ========================================
    function switchCamera() {
      if (!isScanning) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Start scanner first.', 'warning');
        return;
      }
      
      // Toggle between front and back
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      
      var cameraName = (currentFacingMode === 'user') ? 'Front' : 'Back';
      updateStatus('<i class="fas fa-sync-alt fa-spin"></i> Switching to ' + cameraName + ' camera...', 'info');
      
      // Stop current scanner and restart with new facing mode
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(function() {
          isScanning = false;
          // Restart with new facing mode
          startModernScanner();
        }).catch(function() {
          // Force restart
          isScanning = false;
          startModernScanner();
        });
      }
    }

    // ========================================
    // FALLBACK SCANNER - WORKS ON OLDER BROWSERS
    // ========================================
    function startFallbackScanner() {
      isUsingFallback = true;
      updateStatus('<i class="fas fa-info-circle"></i> Using fallback mode. Please use manual entry.', 'warning');
      updateText('📝 Use the manual entry below');
      
      startBtn.classList.add('hidden');
      stopBtn.classList.add('hidden');
      switchCameraBtn.classList.add('hidden');
      
      try {
        var video = document.createElement('video');
        video.setAttribute('autoplay', '');
        video.setAttribute('playsinline', '');
        video.style.width = '100%';
        video.style.height = 'auto';
        video.style.transform = 'scaleX(-1)'; // Mirror front camera
        
        var readerEl = document.getElementById('reader');
        readerEl.innerHTML = '';
        readerEl.appendChild(video);
        
        var facingMode = currentFacingMode || 'user';
        
        if (navigator.getUserMedia) {
          navigator.getUserMedia(
            { video: { facingMode: facingMode } },
            function(stream) {
              videoStream = stream;
              video.srcObject = stream;
              video.play();
              scanOverlay.classList.add('active');
              var cameraName = (facingMode === 'user') ? 'Front' : 'Back';
              updateStatus('<i class="fas fa-camera"></i> ' + cameraName + ' camera active. Use manual entry.', 'info');
              updateText('📷 Camera is on - Use manual LRN entry');
            },
            function(err) {
              console.warn('Fallback camera failed:', err.message);
              updateStatus('<i class="fas fa-exclamation-circle"></i> Camera unavailable. Use manual entry.', 'error');
              updateText('📝 Enter LRN manually below');
              scanOverlay.classList.remove('active');
              showManualEntryMode();
            }
          );
        } else if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } })
            .then(function(stream) {
              videoStream = stream;
              video.srcObject = stream;
              video.play();
              scanOverlay.classList.add('active');
              var cameraName = (facingMode === 'user') ? 'Front' : 'Back';
              updateStatus('<i class="fas fa-camera"></i> ' + cameraName + ' camera active. Use manual entry.', 'info');
              updateText('📷 Camera is on - Use manual LRN entry');
            })
            .catch(function(err) {
              updateStatus('<i class="fas fa-exclamation-circle"></i> Camera unavailable. Use manual entry.', 'error');
              updateText('📝 Enter LRN manually below');
              scanOverlay.classList.remove('active');
              showManualEntryMode();
            });
        } else {
          updateStatus('<i class="fas fa-exclamation-circle"></i> Camera not supported. Use manual entry.', 'error');
          updateText('📝 Enter LRN manually below');
          scanOverlay.classList.remove('active');
          showManualEntryMode();
        }
      } catch(e) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Camera not available. Use manual entry.', 'error');
        updateText('📝 Enter LRN manually');
        scanOverlay.classList.remove('active');
        showManualEntryMode();
      }
      
      startBtn.disabled = false;
      startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
    }

    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(function() {
          isScanning = false;
          scannerInitialized = false;
          scanOverlay.classList.remove('active');
          stopBtn.classList.add('hidden');
          switchCameraBtn.classList.add('hidden');
          startBtn.classList.remove('hidden');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
          updateStatus('<i class="fas fa-info-circle"></i> Scanner stopped.', 'info');
          updateText('⏹️ Stopped');
        }).catch(function() {});
      } else if (videoStream) {
        try {
          videoStream.getTracks().forEach(function(track) { track.stop(); });
          videoStream = null;
        } catch(e) {}
        scanOverlay.classList.remove('active');
        stopBtn.classList.add('hidden');
        switchCameraBtn.classList.add('hidden');
        startBtn.classList.remove('hidden');
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
      } else {
        stopBtn.classList.add('hidden');
        switchCameraBtn.classList.add('hidden');
        startBtn.classList.remove('hidden');
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-camera"></i> Start Camera';
      }
    }

    // ========================================
    // SCAN SUCCESS HANDLER
    // ========================================
    function onScanSuccess(decodedText, decodedResult) {
      processScannedData(decodedText);
    }

    // ========================================
    // PROCESS SCANNED DATA
    // ========================================
    function processScannedData(decodedText) {
      if (isProcessing) return;
      isProcessing = true;
      hideSendStatus();
      
      var email = '';
      var lrn = '';
      var studentName = 'Student';
      
      if (decodedText.indexOf('|') > -1) {
        var parts = decodedText.split('|');
        email = parts[0].trim();
        lrn = parts[1].trim();
      } else if (/^\d{12}$/.test(decodedText)) {
        lrn = decodedText;
      } else {
        resultDiv.innerHTML = '<div style="background:#f8d7da;padding:12px;border-radius:10px;border-left:4px solid #dc3545;">' +
            '<i class="fas fa-exclamation-circle" style="color:#dc3545;font-size:16px;"></i>' +
            '<div style="margin-top:3px;font-weight:600;font-size:13px;">Invalid QR Code</div>' +
            '<div style="font-size:11px;color:#721c24;">Please scan a valid attendance QR code.</div>' +
          '</div>';
        isProcessing = false;
        return;
      }

      if (!/^\d{12}$/.test(lrn)) {
        resultDiv.innerHTML = '<div style="background:#f8d7da;padding:12px;border-radius:10px;border-left:4px solid #dc3545;">' +
            '<i class="fas fa-exclamation-circle" style="color:#dc3545;font-size:16px;"></i>' +
            '<div style="margin-top:3px;font-weight:600;font-size:13px;">Invalid LRN</div>' +
            '<div style="font-size:11px;color:#721c24;">LRN must be 12 digits: ' + lrn + '</div>' +
          '</div>';
        isProcessing = false;
        return;
      }

      var status = 'P';
      var statusDisplay = 'Present (On Time)';
      
      if (serverDateTime && serverDateTime.status) {
        if (serverDateTime.status === 'EARLY') {
          status = 'E';
          statusDisplay = 'Too Early';
        } else if (serverDateTime.status === 'L') {
          status = 'L';
          statusDisplay = 'Late';
        }
      }

      showSendStatus('⏳ Looking up student...', 'sending');

      lookupStudent(lrn, function(name, studentEmail) {
        studentName = name || 'Student';
        var finalEmail = studentEmail || email;
        
        showScannedResult(studentName, lrn, finalEmail, statusDisplay);
        
        var dataToSend = finalEmail + '|' + lrn;
        
        if (window.opener && !window.opener.closed) {
          try {
            window.opener.postMessage({
              type: 'LRN_SCANNED',
              lrn: dataToSend
            }, '*');
            
            showSendStatus('✅ Data sent to attendance form!', 'success');
            updateText('✅ Sent to form - auto-submitting...');
            
            scanCount++;
            updateScanCount();
            
            setTimeout(function() {
              showReadyMessage();
              updateText('🔍 Ready for next student');
              hideSendStatus();
              isProcessing = false;
            }, 2000);
            
          } catch(e) {
            console.warn('Error sending to parent:', e.message);
            showSendStatus('⚠️ Could not send to form. Copy the data below.', 'warning');
            copyToClipboard(lrn, finalEmail);
            setTimeout(function() { isProcessing = false; }, 1500);
          }
        } else {
          showSendStatus('⚠️ No parent window. Copy the data below.', 'warning');
          copyToClipboard(lrn, finalEmail);
          setTimeout(function() { isProcessing = false; }, 1500);
        }
      });
    }

    function onScanError(errorMessage) {
      // Silent - only log critical errors
    }

    // ========================================
    // MANUAL LRN SUBMISSION
    // ========================================
    function submitManualLRN() {
      var lrn = manualLRN.value.trim();
      if (!lrn) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Please enter an LRN.', 'warning');
        return;
      }
      
      if (!/^\d{12}$/.test(lrn)) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> LRN must be 12 digits.', 'error');
        return;
      }
      
      processScannedData(lrn);
      manualLRN.value = '';
    }

    // ========================================
    // TEST QR GENERATION
    // ========================================
    function generateTestQR() {
      var testLRN = '123456789012';
      var testEmail = 'test@example.com';
      var testData = testEmail + '|' + testLRN;
      
      resultDiv.innerHTML = '<div style="background:#d1ecf1;padding:12px;border-radius:10px;border-left:4px solid #17a2b8;text-align:center;font-size:13px;color:#0c5460;">' +
          '<i class="fas fa-info-circle"></i> Test QR Data: <strong>' + testData + '</strong><br>' +
          '<span style="font-size:11px;">Copy this and paste in the LRN field above, or scan with your device.</span>' +
        '</div>';
      
      manualLRN.value = '123456789012';
      updateStatus('<i class="fas fa-check-circle"></i> Test LRN generated! Click "Submit LRN" to test.', 'success');
    }

    // ========================================
    // API FUNCTIONS
    // ========================================
    function getApiUrl(endpoint, params) {
      var baseUrl = getWebAppUrl();
      var url = baseUrl + '?' + endpoint;
      if (params) {
        for (var key in params) {
          if (params.hasOwnProperty(key)) {
            url += '&' + key + '=' + encodeURIComponent(params[key]);
          }
        }
      }
      return url;
    }

    function lookupStudent(lrn, callback) {
      var url = getApiUrl('action=getStudent', { lrn: lrn });
      
      if (typeof fetch === 'function') {
        fetch(url)
          .then(function(response) { return response.json(); })
          .then(function(data) {
            if (data && data.name) {
              callback(data.name, data.email);
            } else {
              callback('Student', '');
            }
          })
          .catch(function() {
            callback('Student', '');
          });
      } else {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4 && xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              if (data && data.name) {
                callback(data.name, data.email);
              } else {
                callback('Student', '');
              }
            } catch(e) {
              callback('Student', '');
            }
          } else if (xhr.readyState === 4) {
            callback('Student', '');
          }
        };
        xhr.send();
      }
    }

    function copyToClipboard(lrn, email) {
      var text = email + '|' + lrn;
      
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
          resultDiv.innerHTML += '<div style="margin-top:10px;padding:10px;background:#d4edda;border-radius:8px;font-size:13px;">' +
              '<strong>Copied:</strong> ' + text +
            '</div>';
          updateText('📋 Copied to clipboard');
        }).catch(function() {
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      resultDiv.innerHTML += '<div style="margin-top:10px;padding:10px;background:#fff3cd;border-radius:8px;font-size:13px;">' +
          '<strong>Data:</strong> ' + text +
        '</div>';
      updateText('📋 Copy the data above');
      
      var textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        updateText('📋 Copied to clipboard (manual method)');
      } catch(e) {}
      document.body.removeChild(textarea);
    }

    // ========================================
    // EVENT LISTENERS
    // ========================================
    startBtn.addEventListener('click', startScannerManually);
    stopBtn.addEventListener('click', stopScanner);
    switchCameraBtn.addEventListener('click', switchCamera);
    manualSubmitBtn.addEventListener('click', submitManualLRN);
    testQRBtn.addEventListener('click', generateTestQR);

    manualLRN.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        submitManualLRN();
      }
    });

    // ========================================
    // START ON PAGE LOAD
    // ========================================
    window.addEventListener('DOMContentLoaded', function() {
      checkBrowserCompatibility();
      loadServerDateTime();
      
      // Set initial camera mode to 'user' (front camera)
      currentFacingMode = 'user';
      
      if (typeof Html5Qrcode === 'undefined') {
        updateStatus('<i class="fas fa-exclamation-triangle"></i> QR library not loaded. Attempting to load...', 'warning');
        loadLibraryAndStart();
      } else {
        updateStatus('<i class="fas fa-info-circle"></i> Ready. Tap "Start Camera" to begin with front camera.', 'info');
        updateText('📱 Tap Start Camera');
        
        setTimeout(function() {
          startScannerManually();
        }, 1500);
      }
    });

    window.addEventListener('beforeunload', function() {
      stopScanner();
    });
  </script>
</body>
