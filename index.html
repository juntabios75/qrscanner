<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MBHS - QR Attendance Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      touch-action: manipulation;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 12px 16px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-height: 99vh;
      overflow-y: auto;
    }
    
    /* Compact Header */
    .header { text-align: center; margin-bottom: 6px; }
    .header i { font-size: 22px; color: #6c5ce7; margin-bottom: 2px; }
    .header h2 { color: #2c3e50; font-size: 15px; font-weight: 700; }
    .header p { color: #7f8c8d; font-size: 10px; }
    
    /* Compact Server DateTime */
    .server-datetime {
      background: #f0f2f5;
      padding: 5px 10px;
      border-radius: 6px;
      margin: 4px 0 6px 0;
      text-align: center;
      font-size: 10px;
      color: #2c3e50;
      border: 1px solid #e4e6eb;
      line-height: 1.4;
    }
    .server-datetime i { color: #6c5ce7; margin-right: 4px; font-size: 10px; }
    .server-datetime .date { font-weight: 600; }
    .server-datetime .time { font-weight: 600; color: #6c5ce7; }
    
    .attendance-status {
      display: inline-block;
      padding: 1px 10px;
      border-radius: 12px;
      font-size: 9px;
      font-weight: 600;
      margin-top: 2px;
    }
    .attendance-status.on-time { background: #d4edda; color: #155724; }
    .attendance-status.late { background: #fff3cd; color: #856404; }
    .attendance-status.early { background: #d1ecf1; color: #0c5460; }
    
    /* Compact Scanner */
    #reader-container {
      width: 100%;
      position: relative;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      min-height: 220px;
      max-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #reader-container video {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    #reader-container video.mirrored {
      transform: scaleX(-1);
    }
    #reader-container canvas {
      display: none;
    }
    
    #scan-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 150px;
      height: 150px;
      border: 2px solid rgba(108, 92, 231, 0.8);
      border-radius: 10px;
      box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.3);
      pointer-events: none;
      display: none;
    }
    #scan-overlay.active {
      display: block;
    }
    #scan-overlay .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: #6c5ce7;
      border-style: solid;
      border-width: 0;
    }
    #scan-overlay .corner.tl { top: -2px; left: -2px; border-top-width: 3px; border-left-width: 3px; border-radius: 3px 0 0 0; }
    #scan-overlay .corner.tr { top: -2px; right: -2px; border-top-width: 3px; border-right-width: 3px; border-radius: 0 3px 0 0; }
    #scan-overlay .corner.bl { bottom: -2px; left: -2px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 3px; }
    #scan-overlay .corner.br { bottom: -2px; right: -2px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 3px 0; }
    
    #result { margin-top: 6px; text-align: center; min-height: 30px; max-height: 150px; overflow-y: auto; font-size: 11px; }
    
    /* Compact Buttons */
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      touch-action: manipulation;
      min-height: 30px;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; }
    .btn-primary:active { transform: scale(0.95); }
    .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-danger:active { transform: scale(0.95); }
    .btn-success { background: linear-gradient(135deg, #28a745, #20c997); color: white; }
    .btn-success:active { transform: scale(0.95); }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:active { transform: scale(0.95); }
    .btn-warning { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
    .btn-warning:active { transform: scale(0.95); }
    .btn-info { background: linear-gradient(135deg, #17a2b8, #0dcaf0); color: white; }
    .btn-info:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .btn-group { 
      display: flex; 
      gap: 5px; 
      margin-top: 6px; 
      justify-content: center; 
      flex-wrap: wrap; 
    }
    .btn-group .btn { flex: 1; min-width: 60px; }
    
    .status-box {
      padding: 4px 10px;
      border-radius: 6px;
      margin: 4px 0;
      text-align: center;
      font-size: 10px;
    }
    .status-success { background: #d4edda; color: #155724; border-left: 3px solid #28a745; }
    .status-error { background: #f8d7da; color: #721c24; border-left: 3px solid #dc3545; }
    .status-info { background: #d1ecf1; color: #0c5460; border-left: 3px solid #17a2b8; }
    .status-warning { background: #fff3cd; color: #856404; border-left: 3px solid #ffc107; }
    
    .scanned-result {
      background: #d4edda;
      padding: 6px 10px;
      border-radius: 6px;
      border-left: 3px solid #28a745;
      margin-bottom: 4px;
      animation: slideIn 0.3s ease;
    }
    .scanned-result .info-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .scanned-result .info-row:last-child { border-bottom: none; }
    .scanned-result .label { font-weight: 600; color: #2c3e50; font-size: 10px; }
    .scanned-result .value { color: #155724; font-weight: 500; font-size: 10px; }
    
    .hidden { display: none !important; }
    
    .counter {
      text-align: center;
      font-size: 10px;
      color: #666;
      margin-top: 4px;
      padding: 3px;
      background: #f8f9fa;
      border-radius: 6px;
    }
    .counter span { font-weight: 700; color: #6c5ce7; }
    
    .scan-animation {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 1.5s ease-in-out infinite;
      margin-right: 4px;
    }
    
    .status-text {
      text-align: center;
      font-size: 9px;
      color: #95a5a6;
      margin-top: 4px;
    }
    
    .send-status {
      margin-top: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 10px;
      text-align: center;
    }
    .send-status.success { background: #d4edda; color: #155724; }
    .send-status.error { background: #f8d7da; color: #721c24; }
    .send-status.sending { background: #d1ecf1; color: #0c5460; }
    
    .camera-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 4px;
      padding: 4px 6px;
      background: #f8f9fa;
      border-radius: 6px;
      flex-wrap: wrap;
    }
    .camera-controls.hidden {
      display: none !important;
    }
    
    .camera-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 600;
    }
    .camera-indicator.front { background: #d1ecf1; color: #0c5460; }
    .camera-indicator.back { background: #d4edda; color: #155724; }
    
    .camera-controls .btn {
      padding: 3px 10px;
      font-size: 10px;
      min-height: 24px;
    }
    
    .btn-switch-camera {
      background: linear-gradient(135deg, #17a2b8, #0dcaf0);
      color: white;
    }
    .btn-switch-camera:active { transform: scale(0.95); }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    @media (max-width: 500px) {
      .container { padding: 8px 10px; }
      #reader-container { min-height: 180px; max-height: 220px; }
      #scan-overlay { width: 120px; height: 120px; }
      .header h2 { font-size: 13px; }
      .btn { font-size: 10px; padding: 4px 10px; min-height: 26px; }
      .btn-group .btn { min-width: 50px; }
    }
    
    @media (max-height: 700px) {
      .container { padding: 6px 8px; }
      #reader-container { min-height: 150px; max-height: 180px; }
      #scan-overlay { width: 100px; height: 100px; }
      .header { margin-bottom: 3px; }
      .header i { font-size: 18px; }
      .header h2 { font-size: 12px; }
      .header p { font-size: 9px; }
      .server-datetime { padding: 3px 6px; font-size: 9px; margin: 3px 0 4px 0; }
      .btn { font-size: 9px; padding: 3px 8px; min-height: 22px; }
      .btn-group { gap: 3px; margin-top: 4px; }
      .camera-controls { padding: 3px 4px; }
      .camera-indicator { font-size: 9px; padding: 2px 8px; }
      .camera-controls .btn { font-size: 9px; padding: 2px 8px; min-height: 20px; }
      .counter { font-size: 9px; }
      .status-text { font-size: 8px; }
      .status-box { font-size: 9px; padding: 3px 6px; }
      #result { font-size: 10px; min-height: 25px; max-height: 100px; }
      .scanned-result .info-row { font-size: 9px; }
    }
  </style>
</head>
<body>
  <div class="container">
            
    <!-- Compact Server DateTime -->
    <div class="server-datetime" id="serverDateTime">
      <i class="fas fa-calendar-day"></i>
      <span class="date" id="serverDate">Loading date...</span>
      <span style="margin: 0 4px;">|</span>
      <i class="fas fa-clock"></i>
      <span class="time" id="serverTime">Loading time...</span>
      <br>
      <span class="attendance-status on-time" id="attendanceStatus">✓ On Time</span>
      <span style="font-size: 8px; color: #6c757d; margin-left: 6px;">
        <i class="fas fa-clock"></i> 5:40 AM - 6:15 AM
      </span>
    </div>

    <div id="statusMessage" class="status-box status-info">
      <i class="fas fa-spinner fa-spin"></i> Initializing...
    </div>

    <div id="reader-container">
      <div id="reader"></div>
      <div id="scan-overlay">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
    </div>
    
    <!-- Camera Controls -->
    <div class="camera-controls" id="cameraControls">
      <span class="camera-indicator back" id="cameraIndicator">
        <i class="fas fa-camera"></i> Back
      </span>
      <button class="btn btn-switch-camera" id="switchCameraBtn">
        <i class="fas fa-sync-alt"></i> Switch to Front
      </button>
    </div>
    
    <div id="result"></div>
    <div id="sendStatus" class="send-status hidden"></div>

    <div class="btn-group">
      <button class="btn btn-primary" id="startBtn">
        <i class="fas fa-camera"></i> Start
      </button>
      <button class="btn btn-danger hidden" id="stopBtn">
        <i class="fas fa-stop"></i> Stop
      </button>
      <button class="btn btn-secondary" onclick="window.close()">
        <i class="fas fa-times"></i> Close
      </button>
    </div>

    <div class="counter">
      <i class="fas fa-users"></i> Scanned: <span id="scanCount">0</span> students
    </div>

    <div class="status-text">
      <span id="statusText">Ready</span>
    </div>
  </div>

  <script>
    // ========================================
    // POLYFILLS FOR OLDER BROWSERS
    // ========================================
    if (!Array.prototype.forEach) {
      Array.prototype.forEach = function(callback, thisArg) {
        for (var i = 0; i < this.length; i++) {
          callback.call(thisArg, this[i], i, this);
        }
      };
    }

    if (!Object.keys) {
      Object.keys = function(obj) {
        var keys = [];
        for (var key in obj) {
          if (obj.hasOwnProperty(key)) {
            keys.push(key);
          }
        }
        return keys;
      };
    }

    // ========================================
    // CONFIGURATION
    // ========================================
    var SCRIPT_ID = 'AKfycbys-BkQT0jRnPC6q5neSRj6JqmOFG_BKa2luh1uI7gwYjaHRDOYmMCOvBDqbV7V310PrA';
    
    // ATTENDANCE WINDOW: 5:40 AM - 6:15 AM
    const ATTENDANCE_START = 340; // 5:40 AM in minutes
    const ATTENDANCE_END = 375;   // 6:15 AM in minutes
    
    function getWebAppUrl() {
      return 'https://script.google.com/macros/s/' + SCRIPT_ID + '/exec';
    }
    
    var html5QrCode = null;
    var isScanning = false;
    var scanCount = 0;
    var isProcessing = false;
    var serverDateTime = {};
    var scannerInitialized = false;
    var videoStream = null;
    var isUsingFallback = false;
    var scannerStartAttempts = 0;
    var maxScannerAttempts = 3;
    var currentFacingMode = 'environment';

    // ========================================
    // DOM REFS
    // ========================================
    var statusMessage = document.getElementById('statusMessage');
    var statusText = document.getElementById('statusText');
    var resultDiv = document.getElementById('result');
    var scanCountEl = document.getElementById('scanCount');
    var stopBtn = document.getElementById('stopBtn');
    var startBtn = document.getElementById('startBtn');
    var switchCameraBtn = document.getElementById('switchCameraBtn');
    var cameraIndicator = document.getElementById('cameraIndicator');
    var cameraControls = document.getElementById('cameraControls');
    var sendStatus = document.getElementById('sendStatus');
    var serverDateEl = document.getElementById('serverDate');
    var serverTimeEl = document.getElementById('serverTime');
    var attendanceStatusEl = document.getElementById('attendanceStatus');
    var readerContainer = document.getElementById('reader-container');
    var scanOverlay = document.getElementById('scan-overlay');

    // ========================================
    // SERVER DATE/TIME FUNCTIONS
    // ========================================
    function loadServerDateTime() {
      var url = getWebAppUrl() + '?action=getServerDateTime';
      
      if (typeof fetch === 'function') {
        fetch(url)
          .then(function(response) { return response.json(); })
          .then(function(data) {
            serverDateTime = data;
            updateServerDisplay(data);
          })
          .catch(function() {
            fallbackDateTime();
          });
      } else {
        loadServerDateTimeXHR();
      }
    }

    function loadServerDateTimeXHR() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', getWebAppUrl() + '?action=getServerDateTime', true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            serverDateTime = data;
            updateServerDisplay(data);
          } catch(e) {
            fallbackDateTime();
          }
        } else if (xhr.readyState === 4) {
          fallbackDateTime();
        }
      };
      xhr.send();
    }

    function fallbackDateTime() {
      var now = new Date();
      var phTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
      var dateStr = phTime.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      var timeStr = phTime.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });
      var totalMinutes = phTime.getHours() * 60 + phTime.getMinutes();
      var status = getAttendanceStatus(totalMinutes);
      updateServerDisplay({
        date: phTime.toISOString().split('T')[0],
        time: timeStr,
        status: status.status,
        statusMessage: status.message
      });
    }

    function getAttendanceStatus(totalMinutes) {
      // Attendance window: 5:40 AM (340) to 6:15 AM (375)
      if (totalMinutes < ATTENDANCE_START) {
        return { status: 'EARLY', message: '⏰ Too early! (5:40 AM start)', class: 'early' };
      } else if (totalMinutes >= ATTENDANCE_START && totalMinutes <= ATTENDANCE_END) {
        return { status: 'P', message: '✓ On Time', class: 'on-time' };
      } else {
        return { status: 'L', message: '⏰ LATE', class: 'late' };
      }
    }

    function updateServerDisplay(data) {
      var dateDisplay = data.date;
      try {
        var dateObj = new Date(data.date + 'T00:00:00');
        dateDisplay = dateObj.toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          timeZone: 'Asia/Manila'
        });
      } catch(e) {}
      
      serverDateEl.textContent = dateDisplay;
      serverTimeEl.textContent = data.time || data.timeFormatted || '--:--';
      
      var statusClass = 'on-time';
      var statusTextVal = '✓ On Time';
      
      if (data.status === 'EARLY') {
        statusClass = 'early';
        statusTextVal = '⏰ Too Early';
      } else if (data.status === 'L') {
        statusClass = 'late';
        statusTextVal = '⏰ LATE';
      } else {
        statusClass = 'on-time';
        statusTextVal = '✓ On Time';
      }
      
      attendanceStatusEl.className = 'attendance-status ' + statusClass;
      attendanceStatusEl.textContent = statusTextVal;
      
      serverDateTime = data;
    }

    // ========================================
    // UTILITY FUNCTIONS
    // ========================================
    function updateStatus(message, type) {
      statusMessage.className = 'status-box status-' + type;
      statusMessage.innerHTML = message;
    }

    function updateText(text) {
      statusText.textContent = text;
    }

    function updateScanCount() {
      scanCountEl.textContent = scanCount;
    }

    function showSendStatus(message, type) {
      sendStatus.className = 'send-status ' + type;
      sendStatus.innerHTML = message;
      sendStatus.classList.remove('hidden');
    }

    function hideSendStatus() {
      sendStatus.classList.add('hidden');
    }

    function showScannedResult(name, lrn, email, statusDisplay) {
      var html = '<div class="scanned-result">' +
          '<div style="display: flex; justify-content: space-between; align-items: center;">' +
            '<div>' +
              '<i class="fas fa-check-circle" style="color: #28a745; font-size: 12px;"></i>' +
              '<span style="font-weight: 600; margin-left: 4px; font-size: 11px;">QR Detected!</span>' +
            '</div>' +
            '<span style="font-size: 9px; color: #155724;">' + new Date().toLocaleTimeString() + '</span>' +
          '</div>' +
          '<div class="info-row"><span class="label">Name:</span><span class="value">' + name + '</span></div>' +
          '<div class="info-row"><span class="label">LRN:</span><span class="value">' + lrn + '</span></div>' +
          '<div class="info-row"><span class="label">Email:</span><span class="value">' + (email || 'N/A') + '</span></div>' +
          '<div class="info-row"><span class="label">Status:</span><span class="value"><span style="background:#6c5ce7;color:white;padding:1px 8px;border-radius:12px;font-size:9px;font-weight:600;">' + statusDisplay + '</span></span></div>' +
        '</div>';
      resultDiv.innerHTML = html;
    }

    function showReadyMessage() {
      resultDiv.innerHTML = '<div style="background:#d1ecf1;padding:6px 10px;border-radius:6px;border-left:3px solid #17a2b8;text-align:center;font-size:10px;color:#0c5460;">' +
          '<i class="fas fa-camera"></i> Ready for next student. Scan another QR code.' +
        '</div>';
    }

    // ========================================
    // UPDATE CAMERA INDICATOR
    // ========================================
    function updateCameraIndicator() {
      var isFront = (currentFacingMode === 'user');
      var cameraName = isFront ? 'Front' : 'Back';
      var icon = isFront ? 'fa-user' : 'fa-camera';
      var className = isFront ? 'front' : 'back';
      var switchText = isFront ? 'Switch to Back' : 'Switch to Front';
      var switchIcon = isFront ? 'fa-camera' : 'fa-user';
      
      cameraIndicator.className = 'camera-indicator ' + className;
      cameraIndicator.innerHTML = '<i class="fas ' + icon + '"></i> ' + cameraName;
      
      switchCameraBtn.innerHTML = '<i class="fas ' + switchIcon + '"></i> ' + switchText;
      
      var videoEl = document.querySelector('#reader video');
      if (videoEl) {
        if (isFront) {
          videoEl.classList.add('mirrored');
        } else {
          videoEl.classList.remove('mirrored');
        }
      }
    }

    // ========================================
    // QR SCANNER
    // ========================================
    function startScannerManually() {
      scannerStartAttempts++;
      
      if (typeof Html5Qrcode !== 'undefined') {
        startModernScanner();
      } else {
        loadLibraryAndStart();
      }
    }

    function loadLibraryAndStart() {
      updateStatus('<i class="fas fa-spinner fa-spin"></i> Loading QR library...', 'info');
      
      var script = document.createElement('script');
      script.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
      script.onload = function() {
        updateStatus('<i class="fas fa-check-circle"></i> Library loaded. Starting...', 'success');
        setTimeout(startModernScanner, 300);
      };
      script.onerror = function() {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to load QR library. Please refresh.', 'error');
      };
      document.head.appendChild(script);
    }

    function startModernScanner() {
      if (html5QrCode) {
        try {
          html5QrCode.stop().then(function() {
            html5QrCode.clear();
            html5QrCode = null;
          }).catch(function() { html5QrCode = null; });
        } catch(e) { html5QrCode = null; }
      }

      startBtn.disabled = true;
      startBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

      try {
        var readerElement = document.getElementById('reader');
        readerElement.innerHTML = '';
        
        if (typeof Html5Qrcode === 'undefined') {
          throw new Error('Html5Qrcode library not loaded');
        }
        
        html5QrCode = new Html5Qrcode("reader");
        scanOverlay.classList.add('active');
        
        var facingMode = currentFacingMode || 'environment';
        updateCameraIndicator();
        
        var config = {
          fps: 10,
          qrbox: { width: 180, height: 180 },
          aspectRatio: 1.0
        };

        html5QrCode.start(
          { facingMode: facingMode },
          config,
          onScanSuccess,
          onScanError
        ).then(function() {
          isScanning = true;
          scannerInitialized = true;
          var cameraName = (facingMode === 'user') ? 'FRONT' : 'BACK';
          updateStatus('<i class="fas fa-camera"></i> <span class="scan-animation"></span> ' + cameraName + ' active', 'success');
          updateText('🔍 Scanning for QR codes...');
          startBtn.classList.add('hidden');
          stopBtn.classList.remove('hidden');
          cameraControls.classList.remove('hidden');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start';
          isUsingFallback = false;
          scannerStartAttempts = 0;
          
          updateCameraIndicator();
        }).catch(function(err) {
          console.warn('Modern scanner failed:', err.message);
          if (scannerStartAttempts < maxScannerAttempts) {
            updateStatus('<i class="fas fa-redo"></i> Retry ' + scannerStartAttempts + '/' + maxScannerAttempts + '...', 'warning');
            setTimeout(startScannerManually, 1000);
          } else {
            updateStatus('<i class="fas fa-exclamation-circle"></i> Camera failed. Please refresh.', 'error');
            updateText('❌ Camera error');
            startBtn.disabled = false;
            startBtn.innerHTML = '<i class="fas fa-camera"></i> Retry';
          }
        });
      } catch (err) {
        console.warn('Scanner error:', err.message);
        if (scannerStartAttempts < maxScannerAttempts) {
          updateStatus('<i class="fas fa-redo"></i> Retry ' + scannerStartAttempts + '/' + maxScannerAttempts + '...', 'warning');
          setTimeout(startScannerManually, 1000);
        } else {
          updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to start. Please refresh.', 'error');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Retry';
        }
      }
    }

    // ========================================
    // SWITCH CAMERA - TOGGLE FRONT/BACK
    // ========================================
    function switchCamera() {
      if (!isScanning && !scannerInitialized) {
        currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
        var cameraName = (currentFacingMode === 'user') ? 'Front' : 'Back';
        updateStatus('<i class="fas fa-info-circle"></i> Starting with ' + cameraName + '...', 'info');
        updateCameraIndicator();
        startScannerManually();
        return;
      }
      
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      
      var cameraName = (currentFacingMode === 'user') ? 'Front' : 'Back';
      updateStatus('<i class="fas fa-sync-alt fa-spin"></i> Switching to ' + cameraName + '...', 'info');
      updateCameraIndicator();
      
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(function() {
          isScanning = false;
          startModernScannerWithMode(currentFacingMode);
        }).catch(function() {
          isScanning = false;
          startModernScannerWithMode(currentFacingMode);
        });
      } else {
        startModernScannerWithMode(currentFacingMode);
      }
    }

    function startModernScannerWithMode(facingMode) {
      if (html5QrCode) {
        try {
          html5QrCode.stop().then(function() {
            html5QrCode.clear();
            html5QrCode = null;
            actuallyStartScanner(facingMode);
          }).catch(function() { 
            html5QrCode = null;
            actuallyStartScanner(facingMode);
          });
        } catch(e) { 
          html5QrCode = null;
          actuallyStartScanner(facingMode);
        }
      } else {
        actuallyStartScanner(facingMode);
      }
    }

    function actuallyStartScanner(facingMode) {
      try {
        var readerElement = document.getElementById('reader');
        readerElement.innerHTML = '';
        
        html5QrCode = new Html5Qrcode("reader");
        scanOverlay.classList.add('active');
        
        var config = {
          fps: 10,
          qrbox: { width: 180, height: 180 },
          aspectRatio: 1.0
        };

        html5QrCode.start(
          { facingMode: facingMode },
          config,
          onScanSuccess,
          onScanError
        ).then(function() {
          isScanning = true;
          scannerInitialized = true;
          var cameraName = (facingMode === 'user') ? 'FRONT' : 'BACK';
          updateStatus('<i class="fas fa-camera"></i> <span class="scan-animation"></span> ' + cameraName + ' active', 'success');
          updateText('🔍 Scanning for QR codes...');
          startBtn.classList.add('hidden');
          stopBtn.classList.remove('hidden');
          cameraControls.classList.remove('hidden');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start';
          isUsingFallback = false;
          
          updateCameraIndicator();
        }).catch(function(err) {
          updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to start camera: ' + err.message, 'error');
          updateText('❌ Camera error');
        });
      } catch (err) {
        updateStatus('<i class="fas fa-exclamation-circle"></i> Failed to initialize: ' + err.message, 'error');
        updateText('❌ Initialization error');
      }
    }

    function stopScanner() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(function() {
          isScanning = false;
          scannerInitialized = false;
          scanOverlay.classList.remove('active');
          stopBtn.classList.add('hidden');
          cameraControls.classList.remove('hidden');
          startBtn.classList.remove('hidden');
          startBtn.disabled = false;
          startBtn.innerHTML = '<i class="fas fa-camera"></i> Start';
          updateStatus('<i class="fas fa-info-circle"></i> Scanner stopped.', 'info');
          updateText('⏹️ Stopped');
        }).catch(function() {});
      } else if (videoStream) {
        try {
          videoStream.getTracks().forEach(function(track) { track.stop(); });
          videoStream = null;
        } catch(e) {}
        scanOverlay.classList.remove('active');
        stopBtn.classList.add('hidden');
        cameraControls.classList.remove('hidden');
        startBtn.classList.remove('hidden');
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-camera"></i> Start';
      } else {
        stopBtn.classList.add('hidden');
        cameraControls.classList.remove('hidden');
        startBtn.classList.remove('hidden');
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-camera"></i> Start';
      }
    }

    // ========================================
    // SCAN SUCCESS HANDLER
    // ========================================
    function onScanSuccess(decodedText, decodedResult) {
      processScannedData(decodedText);
    }

    // ========================================
    // PROCESS SCANNED DATA
    // ========================================
    function processScannedData(decodedText) {
      if (isProcessing) return;
      isProcessing = true;
      hideSendStatus();
      
      var email = '';
      var lrn = '';
      var studentName = 'Student';
      
      if (decodedText.indexOf('|') > -1) {
        var parts = decodedText.split('|');
        email = parts[0].trim();
        lrn = parts[1].trim();
      } else if (/^\d{12}$/.test(decodedText)) {
        lrn = decodedText;
      } else {
        resultDiv.innerHTML = '<div style="background:#f8d7da;padding:6px 10px;border-radius:6px;border-left:3px solid #dc3545;font-size:10px;">' +
            '<i class="fas fa-exclamation-circle" style="color:#dc3545;"></i> Invalid QR Code. Please scan a valid attendance QR.' +
          '</div>';
        isProcessing = false;
        return;
      }

      if (!/^\d{12}$/.test(lrn)) {
        resultDiv.innerHTML = '<div style="background:#f8d7da;padding:6px 10px;border-radius:6px;border-left:3px solid #dc3545;font-size:10px;">' +
            '<i class="fas fa-exclamation-circle" style="color:#dc3545;"></i> Invalid LRN. LRN must be 12 digits: ' + lrn +
          '</div>';
        isProcessing = false;
        return;
      }

      var status = 'P';
      var statusDisplay = 'Present (On Time)';
      
      if (serverDateTime && serverDateTime.status) {
        if (serverDateTime.status === 'EARLY') {
          status = 'E';
          statusDisplay = 'Too Early (5:40 AM)';
        } else if (serverDateTime.status === 'L') {
          status = 'L';
          statusDisplay = 'Late';
        }
      }

      showSendStatus('⏳ Looking up student...', 'sending');

      lookupStudent(lrn, function(name, studentEmail) {
        studentName = name || 'Student';
        var finalEmail = studentEmail || email;
        
        showScannedResult(studentName, lrn, finalEmail, statusDisplay);
        
        var dataToSend = finalEmail + '|' + lrn;
        
        if (window.opener && !window.opener.closed) {
          try {
            window.opener.postMessage({
              type: 'LRN_SCANNED',
              lrn: dataToSend
            }, '*');
            
            showSendStatus('✅ Data sent to form!', 'success');
            updateText('✅ Sent to form - auto-submitting...');
            
            scanCount++;
            updateScanCount();
            
            setTimeout(function() {
              showReadyMessage();
              updateText('🔍 Ready for next student');
              hideSendStatus();
              isProcessing = false;
            }, 2000);
            
          } catch(e) {
            console.warn('Error sending to parent:', e.message);
            showSendStatus('⚠️ Could not send to form. Please try again.', 'warning');
            setTimeout(function() { isProcessing = false; }, 1500);
          }
        } else {
          showSendStatus('⚠️ No parent window found.', 'warning');
          setTimeout(function() { isProcessing = false; }, 1500);
        }
      });
    }

    function onScanError(errorMessage) {
      // Silent
    }

    // ========================================
    // API FUNCTIONS
    // ========================================
    function getApiUrl(endpoint, params) {
      var baseUrl = getWebAppUrl();
      var url = baseUrl + '?' + endpoint;
      if (params) {
        for (var key in params) {
          if (params.hasOwnProperty(key)) {
            url += '&' + key + '=' + encodeURIComponent(params[key]);
          }
        }
      }
      return url;
    }

    function lookupStudent(lrn, callback) {
      var url = getApiUrl('action=getStudent', { lrn: lrn });
      
      if (typeof fetch === 'function') {
        fetch(url)
          .then(function(response) { return response.json(); })
          .then(function(data) {
            if (data && data.name) {
              callback(data.name, data.email);
            } else {
              callback('Student', '');
            }
          })
          .catch(function() {
            callback('Student', '');
          });
      } else {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4 && xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              if (data && data.name) {
                callback(data.name, data.email);
              } else {
                callback('Student', '');
              }
            } catch(e) {
              callback('Student', '');
            }
          } else if (xhr.readyState === 4) {
            callback('Student', '');
          }
        };
        xhr.send();
      }
    }

    // ========================================
    // EVENT LISTENERS
    // ========================================
    startBtn.addEventListener('click', startScannerManually);
    stopBtn.addEventListener('click', stopScanner);
    switchCameraBtn.addEventListener('click', switchCamera);

    // ========================================
    // START ON PAGE LOAD
    // ========================================
    window.addEventListener('DOMContentLoaded', function() {
      loadServerDateTime();
      
      currentFacingMode = 'environment';
      updateCameraIndicator();
      
      if (typeof Html5Qrcode === 'undefined') {
        updateStatus('<i class="fas fa-exclamation-triangle"></i> QR library not loaded. Loading...', 'warning');
        loadLibraryAndStart();
      } else {
        updateStatus('<i class="fas fa-info-circle"></i> Ready. Tap "Start" to begin.', 'info');
        updateText('📱 Tap Start Camera');
        
        setTimeout(function() {
          startScannerManually();
        }, 1500);
      }
    });

    window.addEventListener('beforeunload', function() {
      stopScanner();
    });
  </script>
